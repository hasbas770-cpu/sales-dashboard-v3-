function renderStockGrid() {
  const year      = document.getElementById('st-year')?.value;
  const month     = document.getElementById('st-month')?.value;
  const area      = document.getElementById('st-area')?.value || 'Basra';
  const warehouse = document.getElementById('st-warehouse')?.value || '';
  const line      = document.getElementById('st-line')?.value || 'all';
  if (!year || !month) return;

  const warn = document.getElementById('st-warn');
  if (warn) warn.style.display = warehouse ? 'none' : 'block';

  const prods = DB.get('products').filter(p => line==='all' || p.line===line);
  const stock = DB.getObj('stockEntry');
  const ps    = DB.getObj('primarySales');
  const tbody = document.getElementById('st-tbody');
  if (!tbody) return;

  tbody.innerHTML = prods.map(p => {
    const psKey  = `${year}__${p.name}__${area}__${month}`;
    const primary = Number(ps[psKey] || 0);
    const stKey  = warehouse ? `${year}__${p.name}__${area}__${month}__${warehouse}` : `${year}__${p.name}__${area}__${month}`;
    const saved  = stock[stKey] || { open:null, close:null };

    // Auto-fill opening from previous month closing
    let autoOpen = null;
    if (saved.open == null) {
      const prevMonth = Number(month) === 1 ? 12 : Number(month) - 1;
      const prevYear  = Number(month) === 1 ? Number(year) - 1 : year;
      const prevKey   = warehouse ? `${prevYear}__${p.name}__${area}__${prevMonth}__${warehouse}` : `${prevYear}__${p.name}__${area}__${prevMonth}`;
      const prev = stock[prevKey];
      if (prev?.close != null) autoOpen = prev.close;
    }

    const open  = saved.open  != null ? saved.open  : autoOpen;
    const close = saved.close != null ? saved.close : null;

    // Primary للمخزن — مستقل تماماً عن Primary Sales
    const primStKey = `${stKey}__prim`;
    const savedPrim = stock[primStKey] != null ? stock[primStKey] : null;
    const effPrim   = savedPrim != null ? savedPrim : 0;

    const secondary = open != null && close != null ? open + effPrim - close : '—';

    return `<tr data-key="${stKey}" data-pskey="${psKey}" data-primkey="${primStKey}">
      <td style="text-align:right;font-weight:600">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
      </td>
      <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
      <td>
        <input type="number" class="st-open" value="${open != null ? open : ''}" min="0"
          style="width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
          placeholder="0" oninput="calcSec(this,'${stKey}','${psKey}','${primStKey}')">
      </td>
      <td>
        <input type="number" class="st-primary" value="${savedPrim != null ? savedPrim : ''}" min="0"
          style="width:80px;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
          placeholder="0" oninput="calcSec(this,'${stKey}','${psKey}','${primStKey}')">
      </td>
      <td>
        <input type="number" class="st-close" value="${close != null ? close : ''}" min="0"
          style="width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
          placeholder="0" oninput="calcSec(this,'${stKey}','${psKey}','${primStKey}')">
      </td>
      <td id="sec-${stKey.replace(/[^a-zA-Z0-9]/g,'_')}"
        style="font-weight:700;font-size:14px;color:${secondary==='—'?'var(--muted)':secondary<0?'var(--danger)':secondary>0?'var(--accent2)':'var(--muted)'}">
        ${secondary === '—' ? '—' : fmtSec(secondary)}
      </td>
    </tr>`;
  }).join('');
}

function calcSec(inp, stKey, psKey, primStKey) {
  const row      = inp.closest('tr');
  const openVal  = row.querySelector('.st-open')?.value;
  const closeVal = row.querySelector('.st-close')?.value;
  const primVal  = row.querySelector('.st-primary')?.value;
  const safeId   = stKey.replace(/[^a-zA-Z0-9]/g, '_');
  const el       = document.getElementById(`sec-${safeId}`);
  if (!el) return;
  if (openVal === '' || closeVal === '') {
    el.textContent = '—'; el.style.color = 'var(--muted)'; return;
  }
  // Primary المخزن مستقل — لو فارغ = 0
  const effPrim = primVal !== '' && primVal != null ? Number(primVal) : 0;
  const sec     = Number(openVal) + effPrim - Number(closeVal);
  el.textContent = fmtSec(sec);
  el.style.color = sec > 0 ? 'var(--accent2)' : sec < 0 ? 'var(--danger)' : 'var(--muted)';
}

function filterStock() {
  const q = document.getElementById('st-search')?.value.toLowerCase() || '';
  document.querySelectorAll('#st-tbody tr').forEach(row => {
    row.style.display = row.querySelector('td')?.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function saveStockGrid() {
  const stock   = DB.getObj('stockEntry');
  const wf      = DB.getObj('warehouseFlow');
  const ps      = DB.getObj('primarySales');
  const year    = document.getElementById('st-year')?.value;
  const month   = document.getElementById('st-month')?.value;
  const area    = document.getElementById('st-area')?.value || 'Basra';
  const wh      = document.getElementById('st-warehouse')?.value || '';
  const entries = [];

  document.querySelectorAll('#st-tbody tr').forEach(row => {
    const stKey    = row.dataset.key;
    const psKey    = row.dataset.pskey;
    const primStKey= row.dataset.primkey;
    if (!stKey) return;

    const openVal  = row.querySelector('.st-open')?.value;
    const closeVal = row.querySelector('.st-close')?.value;
    const primVal  = row.querySelector('.st-primary')?.value;
    if ((openVal === '' || openVal == null) && (closeVal === '' || closeVal == null)) return;

    const openNum  = openVal  !== '' && openVal  != null ? Number(openVal)  : null;
    const closeNum = closeVal !== '' && closeVal != null ? Number(closeVal) : null;
    const primNum  = primVal  !== '' && primVal  != null ? Number(primVal)  : null;

    // Save primary override
    if (primNum != null) stock[primStKey] = primNum;
    else delete stock[primStKey];

    const defPrimary = 0; // Primary المخزن مستقل — لا يرث من Primary Sales
    const effPrimary = primNum != null ? primNum : 0;
    const secondary  = openNum != null && closeNum != null ? openNum + effPrimary - closeNum : 0;

    stock[stKey] = { open:openNum, close:closeNum };

    // Update warehouseFlow — sum this warehouse's contribution
    wf[`${psKey}__${wh}`] = secondary;

    // Recalculate total secondary for this product/month (all warehouses)
    const allWhKeys = Object.keys(wf).filter(k => k.startsWith(psKey + '__'));
    const totalSec  = allWhKeys.reduce((s, k) => s + Number(wf[k] || 0), 0);
    wf[psKey] = totalSec;

    // Prepare for Sheets
    const productName = row.cells[row.cells.length - 1]?.textContent?.trim().replace(/^\W+/, '').trim() || '';
    entries.push({
      year, month, area,
      warehouse: wh,
      product:   productName,
      line:      row.querySelector('span[style*="border-radius"]')?.textContent || '',
      opening:   openNum  || 0,
      closing:   closeNum || 0,
      primary:   effPrimary,
      secondary,
    });
  });

  DB.setObj('stockEntry', stock);
  DB.setObj('warehouseFlow', wf);

  // Send to Sheets
  if (entries.length) {
    apiPost({ action:'saveStock', entries })
      .then(d => {
        if (d.success) toast(`✓ Saved — ${d.rowsAdded} added, ${d.rowsUpdated} updated`);
        else toast('⚠ Sheets error: ' + d.error);
      })
      .catch(() => toast('✓ Saved locally (Sheets offline)'));
  } else {
    toast('✓ Saved locally');
  }

  renderStockGrid();
}

    data.orders.forEach(o => {
      const d   = formatDate(o.date);
      const key = `${d}__${o.pharmacy}__${o.rep}__${o.warehouse}`;
      if (!grouped[key]) grouped[key] = { id:key, date:d, rep:o.rep, pharmacy:o.pharmacy, warehouse:o.warehouse, items:[] };
      const line = o.line || getLineByProduct(o.product);
      const normalizedProduct = normalizeProductName(o.product);
      grouped[key].items.push({
        product: normalizedProduct, line,
        qty:Number(o.quantity||0), price:Number(o.unitPrice||0),
        bonusPct:o.bonusPct, bonusQty:Number(o.bonusQty||0),
      });
    });

    _allOrders = Object.values(grouped).sort((a,b) => b.date.localeCompare(a.date));

    // Populate filter dropdowns
    const reps = [...new Set(_allOrders.map(o => o.rep).filter(Boolean))];
    const phs  = [...new Set(_allOrders.map(o => o.pharmacy).filter(Boolean))];
    const repEl = document.getElementById('f-rep');
    const phEl  = document.getElementById('f-ph');
    if (repEl) repEl.innerHTML = '<option value="">All Reps</option>' + reps.map(r=>`<option>${r}</option>`).join('');
    if (phEl)  phEl.innerHTML  = '<option value="">All Pharmacies</option>' + phs.map(p=>`<option>${p}</option>`).join('');

    applyOrderFilters();
  });
}

function renderPenetration(el) {

  const docs  = DB.get('doctors')  || [];

        </p>

          <div class="form-group"><label>Line</label>
            <select id="pen-line">

            </select>
          </div>

        <button class="btn btn-primary btn-sm" onclick="calcPenetration()" style="margin-bottom:14px">
          🔍 Calculate
        </button>
        <div id="pen-result">

        </div>
      </div>
    </div>`;
}

function calcPenetration() {
  const lineFilter   = document.getElementById('pen-line')?.value    || 'all';
  const prodFilter   = document.getElementById('pen-product')?.value || 'all';
  const docFilter    = document.getElementById('pen-doctor')?.value  || 'all';
  const cont         = document.getElementById('pen-result');

  cont.innerHTML = '<div class="loader"><div class="spinner"></div><span style="color:var(--muted);font-size:12px;margin-top:8px">جاري التحليل...</span></div>';

  jsonpRequest(`${SHEETS_URL}?action=getOrders`, function(data) {
    if (!data || !data.success) {
      cont.innerHTML = '<div class="empty">⚠ تعذر تحميل الأوردرات</div>';
      return;
    }

    const docs   = DB.get('doctors')  || [];
    const prods  = DB.get('products') || [];
    const orders = data.orders;

    // فلترة حسب Period
    const period = document.getElementById('pen-period')?.value || 'all';
    const now    = new Date();
    const filteredOrders = orders.filter(o => {
      if (period === 'all') return true;
      const d = new Date(o.date);
      if (period === '1m') return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      const months = Number(period);
      const cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth()-months);
      return d >= cutoff;
    });

    // صيدلية → مواد تسحبها
    const phProducts = {};
    filteredOrders.forEach(o => {
      if (!phProducts[o.pharmacy]) phProducts[o.pharmacy] = new Set();
      phProducts[o.pharmacy].add(o.product);
    });

    const lines = lineFilter === 'all'
      ? ['Derma','Optha','General Line','CM Line']
      : [lineFilter];

    let results = [];

    lines.forEach(line => {
      const lineDocs  = docs.filter(d => d.line===line);
      const totalDocs = lineDocs.length;
      if (totalDocs === 0) return;

      const lineProds = prods.filter(p => p.line===line && (prodFilter==='all' || p.name===prodFilter));

      lineProds.forEach(p => {
        const writingDocs = new Set();
        lineDocs.forEach(doc => {
          (doc.pharmacies||[]).forEach(ph => {
            if (phProducts[ph]?.has(p.name)) writingDocs.add(doc.name);
          });
        });

        const penetration = totalDocs > 0 ? (writingDocs.size / totalDocs * 100) : 0;
        const orderValue  = filteredOrders
          .filter(o=>o.product===p.name)
          .reduce((s,o)=>(s+(Number(o.quantity||0)+Number(o.bonusQty||0))*Number(o.unitPrice||0)),0);

        results.push({
          product: p.name, line,
          totalDocs, writingDocs: writingDocs.size,
          writingDocNames: [...writingDocs],
          penetration, orderValue,
        });
      });
    });

    // فلتر الطبيب
    if (docFilter !== 'all') {
      results = results.filter(r => r.writingDocNames.includes(docFilter));
    }

    results.sort((a,b) => b.penetration - a.penetration);

    if (!results.length) {
      cont.innerHTML = '<div class="empty">لا توجد بيانات</div>';
      return;
    }

    cont.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="text-align:right">Product</th>
            <th>Line</th>
            <th>Total Doctors</th>
            <th>Writing Doctors</th>
            <th>Penetration%</th>
            <th>Order Value</th>
            <th style="text-align:right">Doctors</th>
          </tr></thead>
          <tbody>
            ${results.map(r => {
              const barWidth = Math.min(r.penetration,100).toFixed(0);
              const barColor = r.penetration>=60?'var(--accent2)':r.penetration>=30?'var(--warn)':'var(--danger)';
              // عرض كل الأطباء مع expand
              const id = 'doc_' + r.product.replace(/[^a-zA-Z0-9]/g,'_');
              const showAll = r.writingDocNames.length <= 3;
              const preview = r.writingDocNames.slice(0,3).join('، ');
              const rest    = r.writingDocNames.slice(3);
              const docsHtml = showAll
                ? preview || '—'
                : `${preview} <button onclick="document.getElementById('${id}').style.display='inline'" style="background:rgba(79,142,247,.2);color:var(--accent);border:none;border-radius:999px;padding:1px 6px;font-size:10px;cursor:pointer">+${rest.length}</button><span id="${id}" style="display:none">، ${rest.join('، ')}</span>`;

              return `<tr>
                <td style="text-align:right;font-weight:600;white-space:nowrap">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(r.line)};margin-left:6px"></span>${r.product}
                </td>
                <td><span style="background:${lc(r.line)}18;color:${lc(r.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${r.line}</span></td>
                <td style="color:var(--muted)">${r.totalDocs}</td>
                <td style="font-weight:700;color:${barColor}">${r.writingDocs}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden">
                      <div style="width:${barWidth}%;height:100%;background:${barColor};border-radius:999px"></div>
                    </div>
                    <span style="font-weight:700;color:${barColor};min-width:40px">${r.penetration.toFixed(1)}%</span>
                  </div>
                </td>
                <td style="color:var(--accent2);font-weight:600">${fmtV(r.orderValue)}</td>
                <td style="text-align:right;font-size:11px;color:var(--muted)">${docsHtml}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  });
}

function calcTrend() {
  const prodFilter = document.getElementById('pt-product')?.value || 'all';
  const lineFilter = document.getElementById('pt-line')?.value    || 'all';
  const year       = document.getElementById('pt-year')?.value;
  const fromMonth  = Number(document.getElementById('pt-from')?.value || 1);
  const toMonth    = Number(document.getElementById('pt-to')?.value   || 12);
  const cont       = document.getElementById('pt-result');

  cont.innerHTML = '<div class="loader"><div class="spinner"></div><span style="color:var(--muted);font-size:12px;margin-top:8px">جاري التحليل...</span></div>';

  jsonpRequest(`${SHEETS_URL}?action=getOrders`, function(data) {
    if (!data || !data.success) { cont.innerHTML='<div class="empty">⚠ تعذر تحميل الأوردرات</div>'; return; }

    const docs  = DB.get('doctors')  || [];
    const prods = DB.get('products') || [];
    const orders = data.orders;

    // تجميع الأوردرات حسب الشهر
    const monthOrders = {};
    orders.forEach(o => {
      const d = new Date(o.date);
      if (String(d.getFullYear()) !== String(year)) return;
      const m = d.getMonth() + 1;
      if (m < fromMonth || m > toMonth) return;
      if (!monthOrders[m]) monthOrders[m] = [];
      monthOrders[m].push(o);
    });

    const months = [];
    for (let m = fromMonth; m <= toMonth; m++) months.push(m);
    const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // المواد المطلوبة
    let targetProds = prods.filter(p =>
      (lineFilter==='all' || p.line===lineFilter) &&
      (prodFilter==='all' || p.name===prodFilter)
    );

    if (!targetProds.length) { cont.innerHTML='<div class="empty">لا توجد مواد</div>'; return; }

    // حساب Trend لكل مادة
    const trendData = targetProds.map(p => {
      const lineDocs  = docs.filter(d => d.line===p.line);
      const totalDocs = lineDocs.length;
      if (totalDocs === 0) return null;

      const monthlyData = months.map(m => {
        const mo = monthOrders[m] || [];
        // صيدليات سحبت هذه المادة هذا الشهر
        const phWithProd = new Set(mo.filter(o=>o.product===p.name).map(o=>o.pharmacy));
        // أطباء يكتبونها
        const writingDocs = new Set();
        lineDocs.forEach(doc => {
          (doc.pharmacies||[]).forEach(ph => {
            if (phWithProd.has(ph)) writingDocs.add(doc.name);
          });
        });
        const pct = totalDocs > 0 ? (writingDocs.size / totalDocs * 100) : 0;
        return { month:m, writing:writingDocs.size, total:totalDocs, pct, docs:[...writingDocs] };
      });

      return { name:p.name, line:p.line, totalDocs, monthlyData };
    }).filter(Boolean);

    if (!trendData.length) { cont.innerHTML='<div class="empty">لا توجد بيانات</div>'; return; }

    // عرض الجدول
    let html = `<div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:right">Product</th>
        <th>Line</th>
        <th>Doctors</th>
        ${months.map(m=>`<th>${monthNames[m]}</th>`).join('')}
        <th>Trend</th>
      </tr></thead><tbody>`;

    trendData.forEach(p => {
      const first = p.monthlyData.find(m=>m.writing>0)?.pct || 0;
      const last  = [...p.monthlyData].reverse().find(m=>m.writing>0)?.pct || 0;
      const trend = last > first ? '↑' : last < first ? '↓' : '→';
      const trendColor = last > first ? 'var(--accent2)' : last < first ? 'var(--danger)' : 'var(--muted)';

      html += `<tr>
        <td style="text-align:right;font-weight:600;white-space:nowrap">
          <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
        </td>
        <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
        <td style="color:var(--muted)">${p.totalDocs}</td>
        ${p.monthlyData.map(m => {
          const c = m.pct>=60?'var(--accent2)':m.pct>=30?'var(--warn)':m.pct>0?'var(--danger)':'var(--muted)';
          return `<td>
            <div style="text-align:center">
              <div style="font-weight:700;color:${c}">${m.writing}</div>
              <div style="font-size:10px;color:${c}">${m.pct.toFixed(0)}%</div>
              <div style="height:3px;background:rgba(255,255,255,.06);border-radius:999px;margin-top:3px">
                <div style="width:${Math.min(m.pct,100).toFixed(0)}%;height:100%;background:${c};border-radius:999px"></div>
              </div>
            </div>
          </td>`;
        }).join('')}
        <td style="font-size:18px;font-weight:700;color:${trendColor}">${trend}</td>
      </tr>`;
    });

    html += '</tbody></table></div>';
    cont.innerHTML = html;
  });
}

function renderPerfTable() {
  const year     = Number(document.getElementById('pf-year')?.value  || new Date().getFullYear());
  const area     = document.getElementById('pf-area')?.value         || 'Basra';
  const fromM    = Number(document.getElementById('pf-from')?.value  || 1);
  const toM      = Number(document.getElementById('pf-to')?.value    || new Date().getMonth()+1);
  const sublineF = document.getElementById('pf-subline')?.value      || 'all';
  const sortBy   = document.getElementById('pf-sort')?.value         || 'ach_desc';

  // المندوبين المختارين
  const selectedBtns = [...document.querySelectorAll('.pf-rep-btn[data-selected="1"]')];
  const selectedReps = selectedBtns.length ? selectedBtns.map(b=>b.dataset.rep) : null; // null = all

  const months  = [];
  for (let m = fromM; m <= toM; m++) months.push(m);

  // الشهر السابق
  const prevMonths = [];
  for (let m = fromM; m <= toM; m++) {
    const pm = m === 1 ? 12 : m-1;
    const py = m === 1 ? year-1 : year;
    prevMonths.push({m:pm, y:py});
  }

  const ps        = DB.getObj('primarySales');
  const wf        = DB.getObj('warehouseFlow');
  const targets   = DB.getObj('productTargets');
  const sublines  = DB.getObj('sublines') || {};
  const savedReps = DB.getObj('repsData') || {};
  const cont      = document.getElementById('pf-table');
  if (!cont) return;

  const achColor  = c => c>=100?'var(--accent2)':c>=80?'var(--warn)':'var(--danger)';

  // بناء بيانات لكل مندوب
  const repEntries = Object.entries(savedReps)
    .filter(([k]) => k.endsWith(`__${year}`))
    .map(([k, repData]) => {
      const repName = k.replace(`__${year}`,'');
      if (selectedReps && !selectedReps.includes(repName)) return null;

      let repProds = (repData.subline||[]);
      if (sublineF !== 'all' && sublines[sublineF]) {
        repProds = repProds.filter(pn => (sublines[sublineF].products||[]).includes(pn));
      }
      if (!repProds.length) return null;

      const allProds = DB.get('products') || [];

      // بيانات كل مادة
      const prodData = repProds.map(pn => {
        const p     = allProds.find(x=>x.name===pn); if (!p) return null;
        const price = Number(p.price||0);

        // Primary المنطقة الكلي
        let totalAreaQty = 0;
        months.forEach(m => { totalAreaQty += Number(ps[`${year}__${pn}__${area}__${m}`]||0); });

        // نسبة المندوب = Target المندوب ÷ Target المنطقة الكلي
        const annTotal  = targets[`${year}__${pn}__${area}`] || p.annualTarget || 0;
        const tQtyTotal = Math.round(annTotal/12*months.length);

        const repAnnTarget = repData.targets?.[pn] != null ? Number(repData.targets[pn]) : annTotal;
        const tQty = Math.round(repAnnTarget/12*months.length);

        // حصة المندوب من Primary
        const repRatio = tQtyTotal > 0 ? (tQty / tQtyTotal) : 1;
        const pQty     = Math.round(totalAreaQty * repRatio);
        const pVal     = pQty * price;

        // Primary الشهر السابق (بنفس النسبة)
        let prevAreaQty = 0;
        prevMonths.forEach(({m,y}) => { prevAreaQty += Number(ps[`${y}__${pn}__${area}__${m}`]||0); });
        const prevQty = Math.round(prevAreaQty * repRatio);

        // Target
        const tVal  = tQty * price;
        const ach   = tVal > 0 ? (pVal/tVal*100) : 0;

        // Secondary هذه الفترة
        let secTotal = 0;
        months.forEach(m => {
          const key = `${year}__${pn}__${area}__${m}`;
          if (wf[key] !== undefined) secTotal += Number(wf[key]);
        });

        // Flow Rate = Secondary ÷ Primary × 100
        const flowRate = pQty > 0 ? (secTotal / pQty * 100) : null;

        // Flow Rate الشهر السابق
        let prevSec = 0;
        prevMonths.forEach(({m,y}) => {
          const key = `${y}__${pn}__${area}__${m}`;
          if (wf[key] !== undefined) prevSec += Number(wf[key]);
        });
        const prevFlowRate = prevQty > 0 ? (prevSec / prevQty * 100) : null;
        const flowTrend    = flowRate != null && prevFlowRate != null
          ? flowRate - prevFlowRate : null;

        return { pn, p, price, pQty, pVal, tQty, tVal, ach, secTotal, flowRate, prevFlowRate, flowTrend };
      }).filter(Boolean);

      // Sort المواد
      const sorted = [...prodData].sort((a,b) => {
        if (sortBy==='ach_desc')  return b.ach - a.ach;
        if (sortBy==='ach_asc')   return a.ach - b.ach;
        if (sortBy==='flow_desc') return (b.flowRate||0) - (a.flowRate||0);
        if (sortBy==='flow_asc')  return (a.flowRate||0) - (b.flowRate||0);
        if (sortBy==='val_desc')  return b.pVal - a.pVal;
        return 0;
      });

      // Totals
      const totPrimVal = prodData.reduce((s,p)=>s+p.pVal,0);
      const totTgtVal  = prodData.reduce((s,p)=>s+p.tVal,0);
      const totAch     = totTgtVal>0?(totPrimVal/totTgtVal*100):0;
      const totSec     = prodData.reduce((s,p)=>s+p.secTotal,0);
      const totPrimQty = prodData.reduce((s,p)=>s+p.pQty,0);
      const totFlow    = totPrimQty>0?(totSec/totPrimQty*100):null;

      return { repName, line:repData.line||'—', sorted, totPrimVal, totTgtVal, totAch, totFlow };
    }).filter(Boolean);

  // Sort المندوبين
  repEntries.sort((a,b) => {
    if (sortBy==='ach_desc'||sortBy==='ach_asc') return sortBy==='ach_desc' ? b.totAch-a.totAch : a.totAch-b.totAch;
    if (sortBy==='flow_desc'||sortBy==='flow_asc') return sortBy==='flow_desc' ? (b.totFlow||0)-(a.totFlow||0) : (a.totFlow||0)-(b.totFlow||0);
    return b.totPrimVal-a.totPrimVal;
  });

  if (!repEntries.length) {
    cont.innerHTML = '<div class="empty">لا توجد بيانات — أضف مندوبين من Master Data</div>';
    return;
  }

  cont.innerHTML = repEntries.map(rep => `
    <div class="card" style="margin-bottom:14px">
      <!-- Rep Header -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--grad);display:grid;place-items:center;font-size:16px">👤</div>
          <div>
            <div style="font-weight:700;font-size:15px;color:#fff">${rep.repName}</div>
            <div style="font-size:11px;color:var(--muted)">${rep.line}</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--muted)">Primary Value</div>
            <div style="font-weight:700;color:#fff">${fmtV(rep.totPrimVal)}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--muted)">Target</div>
            <div style="font-weight:700;color:var(--muted)">${fmtV(rep.totTgtVal)}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--muted)">Ach%</div>
            <div style="font-weight:700;font-size:18px;color:${achColor(rep.totAch)}">${rep.totAch.toFixed(1)}%</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--muted)">Flow Rate</div>
            <div style="font-weight:700;font-size:18px;color:${rep.totFlow!=null?achColor(rep.totFlow):'var(--muted)'}">${rep.totFlow!=null?rep.totFlow.toFixed(1)+'%':'—'}</div>
          </div>
        </div>
      </div>
      <!-- Progress -->
      <div style="height:3px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin-bottom:14px">
        <div style="width:${Math.min(rep.totAch,100).toFixed(0)}%;height:100%;background:${lc(rep.line)};border-radius:999px"></div>
      </div>
      <!-- Products Table -->
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="text-align:right">Product</th>
          <th>NSP</th>
          <th>Primary Qty</th>
          <th>Primary Value</th>
          <th>Target Value</th>
          <th>Ach%</th>
          <th>Secondary</th>
          <th>Flow Rate%</th>
          <th>vs Prev</th>
        </tr></thead>
        <tbody>
          ${rep.sorted.map(d=>`<tr>
            <td style="text-align:right;font-weight:600;white-space:nowrap">${d.pn}</td>
            <td style="color:var(--muted);font-size:11px">${d.price?'$'+d.price.toFixed(2):'—'}</td>
            <td>${fmt(d.pQty)}</td>
            <td style="color:var(--accent2);font-weight:700">${fmtV(d.pVal)}</td>
            <td style="color:var(--muted)">${fmtV(d.tVal)}</td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <div style="width:50px;height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden">
                  <div style="width:${Math.min(d.ach,100).toFixed(0)}%;height:100%;background:${achColor(d.ach)};border-radius:999px"></div>
                </div>
                <span style="font-weight:700;color:${achColor(d.ach)}">${d.ach.toFixed(1)}%</span>
              </div>
            </td>
            <td style="color:${d.secTotal<0?'var(--danger)':d.secTotal>0?'var(--accent)':'var(--muted)'};font-weight:600">${fmtSec(d.secTotal)}</td>
            <td style="color:${d.flowRate!=null?achColor(d.flowRate):'var(--muted)'};font-weight:700">${d.flowRate!=null?d.flowRate.toFixed(1)+'%':'—'}</td>
            <td style="font-size:11px">
              ${d.flowTrend!=null
                ? `<span style="color:${d.flowTrend>0?'var(--accent2)':d.flowTrend<0?'var(--danger)':'var(--muted)'};font-weight:600">
                    ${d.flowTrend>0?'↑':d.flowTrend<0?'↓':'→'} ${Math.abs(d.flowTrend).toFixed(1)}%
                   </span>`
                : '<span style="color:var(--muted)">—</span>'}
            </td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`).join('');
}

function calcTrend() {
  const prodFilter = document.getElementById('pt-product')?.value || 'all';
  const lineFilter = document.getElementById('pt-line')?.value    || 'all';
  const year       = document.getElementById('pt-year')?.value;
  const fromMonth  = Number(document.getElementById('pt-from')?.value || 1);
  const toMonth    = Number(document.getElementById('pt-to')?.value   || 12);
  const cont       = document.getElementById('pt-result');

  cont.innerHTML = '<div class="loader"><div class="spinner"></div><span style="color:var(--muted);font-size:12px;margin-top:8px">جاري التحليل...</span></div>';

  jsonpRequest(`${SHEETS_URL}?action=getOrders`, function(data) {
    if (!data || !data.success) { cont.innerHTML='<div class="empty">⚠ تعذر تحميل الأوردرات</div>'; return; }

    const docs  = DB.get('doctors')  || [];
    const prods = DB.get('products') || [];
    const orders = data.orders;

    // تجميع الأوردرات حسب الشهر
    const monthOrders = {};
    orders.forEach(o => {
      const d = new Date(o.date);
      if (String(d.getFullYear()) !== String(year)) return;
      const m = d.getMonth() + 1;
      if (m < fromMonth || m > toMonth) return;
      if (!monthOrders[m]) monthOrders[m] = [];
      monthOrders[m].push(o);
    });

    const months = [];
    for (let m = fromMonth; m <= toMonth; m++) months.push(m);
    const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // المواد المطلوبة
    let targetProds = prods.filter(p =>
      (lineFilter==='all' || p.line===lineFilter) &&
      (prodFilter==='all' || p.name===prodFilter)
    );

    if (!targetProds.length) { cont.innerHTML='<div class="empty">لا توجد مواد</div>'; return; }

    // حساب Trend لكل مادة
    const trendData = targetProds.map(p => {
      const lineDocs  = docs.filter(d => d.line===p.line);
      const totalDocs = lineDocs.length;
      if (totalDocs === 0) return null;

      const monthlyData = months.map(m => {
        const mo = monthOrders[m] || [];
        // صيدليات سحبت هذه المادة هذا الشهر
        const phWithProd = new Set(mo.filter(o=>o.product===p.name).map(o=>o.pharmacy));
        // أطباء يكتبونها
        const writingDocs = new Set();
        lineDocs.forEach(doc => {
          (doc.pharmacies||[]).forEach(ph => {
            if (phWithProd.has(ph)) writingDocs.add(doc.name);
          });
        });
        const pct = totalDocs > 0 ? (writingDocs.size / totalDocs * 100) : 0;
        return { month:m, writing:writingDocs.size, total:totalDocs, pct, docs:[...writingDocs] };
      });

      return { name:p.name, line:p.line, totalDocs, monthlyData };
    }).filter(Boolean);

    if (!trendData.length) { cont.innerHTML='<div class="empty">لا توجد بيانات</div>'; return; }

    // عرض الجدول
    let html = `<div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:right">Product</th>
        <th>Line</th>
        <th>Doctors</th>
        ${months.map(m=>`<th>${monthNames[m]}</th>`).join('')}
        <th>Trend</th>
      </tr></thead><tbody>`;

    trendData.forEach(p => {
      const first = p.monthlyData.find(m=>m.writing>0)?.pct || 0;
      const last  = [...p.monthlyData].reverse().find(m=>m.writing>0)?.pct || 0;
      const trend = last > first ? '↑' : last < first ? '↓' : '→';
      const trendColor = last > first ? 'var(--accent2)' : last < first ? 'var(--danger)' : 'var(--muted)';

      html += `<tr>
        <td style="text-align:right;font-weight:600;white-space:nowrap">
          <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
        </td>
        <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
        <td style="color:var(--muted)">${p.totalDocs}</td>
        ${p.monthlyData.map(m => {
          const c = m.pct>=60?'var(--accent2)':m.pct>=30?'var(--warn)':m.pct>0?'var(--danger)':'var(--muted)';
          return `<td>
            <div style="text-align:center">
              <div style="font-weight:700;color:${c}">${m.writing}</div>
              <div style="font-size:10px;color:${c}">${m.pct.toFixed(0)}%</div>
              <div style="height:3px;background:rgba(255,255,255,.06);border-radius:999px;margin-top:3px">
                <div style="width:${Math.min(m.pct,100).toFixed(0)}%;height:100%;background:${c};border-radius:999px"></div>
              </div>
            </div>
          </td>`;
        }).join('')}
        <td style="font-size:18px;font-weight:700;color:${trendColor}">${trend}</td>
      </tr>`;
    });

    html += '</tbody></table></div>';
    cont.innerHTML = html;
  });
}
/* ──────────────────────────────────────

────────────────────────────────────── */
function renderPerformance(el) {
  const now     = new Date();
  const year    = now.getFullYear();
  const curM    = now.getMonth() + 1;
  const areas   = DB.get('areas') || ['Basra'];
  const sublines = DB.getObj('sublines') || {};
  const savedReps = DB.getObj('repsData') || {};
  const months  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // اجمع أسماء المندوبين من repsData
  const repNames = [...new Set(Object.keys(savedReps).map(k=>k.split('__')[0]))].sort();

  el.innerHTML = `
    <div class="fade-up">
      <div style="padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:16px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
          <div class="form-group"><label>Year</label>
            <select id="pf-year" onchange="renderPerfTable()">
              ${[2024,2025,2026,2027,2028].map(y=>`<option${y===year?' selected':''}>${y}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Region</label>
            <select id="pf-area" onchange="renderPerfTable()">
              ${areas.map(a=>`<option>${a}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>From</label>
            <select id="pf-from" onchange="renderPerfTable()">
              ${months.map((m,i)=>`<option value="${i+1}"${i===0?' selected':''}>${m}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>To</label>
            <select id="pf-to" onchange="renderPerfTable()">
              ${months.map((m,i)=>`<option value="${i+1}"${i===curM-1?' selected':''}>${m}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Sub-line</label>
            <select id="pf-subline" onchange="renderPerfTable()">
              <option value="all">All Lines</option>
              ${Object.keys(sublines).map(s=>`<option value="${s}">${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Rep (اختياري)</label>
            <select id="pf-rep" onchange="renderPerfTable()">
              <option value="">All Reps</option>
              ${repNames.map(r=>`<option>${r}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>
      <div id="pf-table"></div>
    </div>`;

  renderPerfTable();
}

function renderPerfTable() {
  const year     = Number(document.getElementById('pf-year')?.value  || new Date().getFullYear());
  const area     = document.getElementById('pf-area')?.value         || 'Basra';
  const fromM    = Number(document.getElementById('pf-from')?.value  || 1);
  const toM      = Number(document.getElementById('pf-to')?.value    || new Date().getMonth()+1);
  const sublineF = document.getElementById('pf-subline')?.value      || 'all';
  const repF     = document.getElementById('pf-rep')?.value          || '';

  const months    = [];
  for (let m = fromM; m <= toM; m++) months.push(m);

  const ps        = DB.getObj('primarySales');
  const targets   = DB.getObj('productTargets');
  const sublines  = DB.getObj('sublines') || {};
  const savedReps = DB.getObj('repsData') || {};
  const cont      = document.getElementById('pf-table');
  if (!cont) return;

  // المواد
  let prods = DB.get('products') || [];
  if (sublineF !== 'all' && sublines[sublineF]) {
    prods = prods.filter(p => (sublines[sublineF].products||[]).includes(p.name));
  }

  // لو اختار مندوب — فلتر بمواده
  if (repF) {
    const repData = savedReps[`${repF}__${year}`];
    if (repData?.subline?.length) {
      prods = prods.filter(p => repData.subline.includes(p.name));
    }
  }

  // تجميع حسب Line
  const byLine = {};
  prods.forEach(p => {
    if (!byLine[p.line]) byLine[p.line] = [];
    byLine[p.line].push(p);
  });

  const achColor = c => c>=100?'var(--accent2)':c>=80?'var(--warn)':'var(--danger)';

  let html = '';

  Object.entries(byLine).forEach(([line, lineProds]) => {
    // حساب totals للـ Line
    let linePrimQty=0, linePrimVal=0, lineTgtQty=0, lineTgtVal=0;
    const prodRows = lineProds.map(p => {
      const price = Number(p.price || 0);
      const ann   = targets[`${year}__${p.name}__${area}`] || p.annualTarget || 0;
      const tQty  = Math.round(ann / 12 * months.length);
      const tVal  = tQty * price;
      let pQty = 0;
      months.forEach(m => { pQty += Number(ps[`${year}__${p.name}__${area}__${m}`]||0); });
      const pVal  = pQty * price;
      const ach   = tVal > 0 ? (pVal/tVal*100) : 0;

      // لو اختار مندوب — يعرض target المندوب
      let repTgtQty = tQty, repTgtVal = tVal;
      if (repF) {
        const repData = savedReps[`${repF}__${year}`];
        if (repData?.targets?.[p.name] != null) {
          repTgtQty = Math.round(Number(repData.targets[p.name]) / 12 * months.length);
          repTgtVal = repTgtQty * price;
        }
      }
      const repAch = repTgtVal > 0 ? (pVal/repTgtVal*100) : ach;

      linePrimQty += pQty;
      linePrimVal += pVal;
      lineTgtQty  += repF ? repTgtQty : tQty;
      lineTgtVal  += repF ? repTgtVal : tVal;

      return { p, pQty, pVal, tQty:repF?repTgtQty:tQty, tVal:repF?repTgtVal:tVal, ach:repF?repAch:ach };
    });

    const lineAch = lineTgtVal > 0 ? (linePrimVal/lineTgtVal*100) : 0;

    html += `
      <div class="card" style="margin-bottom:14px">
        <!-- Line Header -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="width:10px;height:10px;border-radius:50%;background:${lc(line)};display:inline-block"></span>
            <h2 style="margin:0;color:${lc(line)}">${line}</h2>
          </div>
          <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
            <div style="text-align:center">
              <div style="font-size:10px;color:var(--muted)">Primary Value</div>
              <div style="font-weight:700;color:#fff">${fmtV(linePrimVal)}</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:10px;color:var(--muted)">Target Value</div>
              <div style="font-weight:700;color:var(--muted)">${fmtV(lineTgtVal)}</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:10px;color:var(--muted)">Achievement</div>
              <div style="font-weight:700;font-size:18px;color:${achColor(lineAch)}">${lineAch.toFixed(1)}%</div>
            </div>
          </div>
        </div>
        <!-- Progress -->
        <div style="height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin-bottom:14px">
          <div style="width:${Math.min(lineAch,100).toFixed(0)}%;height:100%;background:${lc(line)};border-radius:999px"></div>
        </div>
        <!-- Products Table -->
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="text-align:right">Product</th>
              <th>NSP ($)</th>
              <th>Sales Qty</th>
              <th>Sales Value</th>
              <th>Target Qty</th>
              <th>Target Value</th>
              <th>Achievement%</th>
            </tr></thead>
            <tbody>
              ${prodRows.map(({p,pQty,pVal,tQty,tVal,ach}) => `<tr>
                <td style="text-align:right;font-weight:600">${p.name}</td>
                <td style="color:var(--muted)">${p.price?'$'+Number(p.price).toFixed(2):'—'}</td>
                <td style="font-weight:600">${fmt(pQty)}</td>
                <td style="color:var(--accent2);font-weight:700">${fmtV(pVal)}</td>
                <td style="color:var(--muted)">${fmt(tQty)}</td>
                <td style="color:var(--muted)">${fmtV(tVal)}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;min-width:60px">
                      <div style="width:${Math.min(ach,100).toFixed(0)}%;height:100%;background:${achColor(ach)};border-radius:999px"></div>
                    </div>
                    <span style="font-weight:700;color:${achColor(ach)};min-width:45px">${ach.toFixed(1)}%</span>
                  </div>
                </td>
              </tr>`).join('')}
              <!-- Line Total -->
              <tr style="background:rgba(255,255,255,.04);font-weight:700;border-top:2px solid var(--border)">
                <td style="text-align:right;color:${lc(line)}">Total ${line}</td>
                <td></td>
                <td style="color:#fff">${fmt(linePrimQty)}</td>
                <td style="color:var(--accent2)">${fmtV(linePrimVal)}</td>
                <td style="color:var(--muted)">${fmt(lineTgtQty)}</td>
                <td style="color:var(--muted)">${fmtV(lineTgtVal)}</td>
                <td style="color:${achColor(lineAch)};font-size:14px">${lineAch.toFixed(1)}%</td>
              </tr>
            </tbody>
          </table>
        </div>

        ${(() => {
          // جدول المندوبين لهذا اللاين
          const lineRepRows = Object.entries(savedReps)
            .filter(([k]) => k.endsWith(`__${year}`))
            .map(([k, repData]) => {
              const repName = k.replace(`__${year}`,'');
              if (repData.line !== line) return null;
              // مواد المندوب في هذا اللاين
              const repProds = (repData.subline||[]).filter(pn => lineProds.find(p=>p.name===pn));
              if (!repProds.length) return null;
              let rVal=0, rTgtVal=0;
              repProds.forEach(pn => {
                const p = lineProds.find(x=>x.name===pn); if (!p) return;
                const price = Number(p.price||0);
                let pQty = 0;
                months.forEach(m => { pQty += Number(ps[`${year}__${pn}__${area}__${m}`]||0); });
                rVal += pQty * price;
                const ann  = targets[`${year}__${pn}__${area}`] || p.annualTarget || 0;
                const tQ   = repData.targets?.[pn] != null
                  ? Math.round(Number(repData.targets[pn])/12*months.length)
                  : Math.round(ann/12*months.length);
                rTgtVal += tQ * price;
              });
              const rAch = rTgtVal>0?(rVal/rTgtVal*100):0;
              return { repName, rVal, rTgtVal, rAch };
            }).filter(Boolean);

          if (!lineRepRows.length) return '';
          return `
            <div style="margin-top:12px">
              <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">👥 أداء المندوبين</div>
              <div class="table-wrap"><table>
                <thead><tr>
                  <th style="text-align:right">المندوب</th>
                  <th>Sales Value</th>
                  <th>Target Value</th>
                  <th>Achievement%</th>
                </tr></thead>
                <tbody>
                  ${lineRepRows.map(r=>`<tr>
                    <td style="text-align:right;font-weight:600">👤 ${r.repName}</td>
                    <td style="color:var(--accent2);font-weight:700">${fmtV(r.rVal)}</td>
                    <td style="color:var(--muted)">${fmtV(r.rTgtVal)}</td>
                    <td>
                      <div style="display:flex;align-items:center;gap:8px">
                        <div style="flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;min-width:60px">
                          <div style="width:${Math.min(r.rAch,100).toFixed(0)}%;height:100%;background:${achColor(r.rAch)};border-radius:999px"></div>
                        </div>
                        <span style="font-weight:700;color:${achColor(r.rAch)};min-width:45px">${r.rAch.toFixed(1)}%</span>
                      </div>
                    </td>
                  </tr>`).join('')}
                </tbody>
              </table></div>
            </div>`;
        })()}
      </div>`;
  });

  cont.innerHTML = html || '<div class="empty">لا توجد بيانات</div>';
}

const PAGES = {
  dashboard:   { title:'Dashboard',              sub:'نظرة عامة على الأداء',                  render: renderDashboard   },
  products:    { title:'المنتجات',               sub:'إدارة قائمة المنتجات والأهداف',          render: renderProducts    },
  pharmacies:  { title:'الصيدليات',              sub:'إدارة صيدليات المجمعات',                 render: renderPharmacies  },
  doctors:     { title:'الأطباء',                sub:'إدارة قائمة الأطباء',                    render: renderDoctors     },
  reps:        { title:'المندوبين',              sub:'فريق المبيعات',                           render: renderReps        },
  warehouses:  { title:'Warehouses',             sub:'إدارة المخازن والمجموعات',               render: renderWarehouses  },
  wh_summary:  { title:'Warehouse Summary',      sub:'تقرير المخازن — Opening + Primary + Closing + Secondary', render: renderWhSummary },
  wh_add:      { title:'Add Warehouse',           sub:'إضافة مخزن جديد',                         render: renderWhAdd       },
  sublines:    { title:'Sub-lines',           sub:'إدارة مجموعات المواد',                    render: renderSublines    },
  regions:     { title:'المناطق',                sub:'إدارة المناطق',                           render: renderRegions     },
  primary:     { title:'Primary Sales',          sub:'مبيعات المستودع الشهرية',                render: renderPrimary     },
  secondary:   { title:'Secondary Sales',        sub:'مبيعات الصيدليات — محسوبة من Stock',    render: renderSecondary   },
  stock:       { title:'Stock Entry',            sub:'إدخال أرصدة المخازن — يحسب Secondary',  render: renderStock       },
  orders:      { title:'Pharmacy Orders',        sub:'أوردرات صيدليات المجمعات',               render: renderOrders      },
  targets:     { title:'الأهداف',                sub:'إدارة الأهداف السنوية',                  render: el => el.innerHTML='<div class="fade-up"><div class="card"><h2>🎯 الأهداف</h2><p style="color:var(--muted)">قريباً</p></div></div>' },
  penetration: { title:'Penetration',            sub:'نسبة تغطية الأطباء لكل مادة',             render: renderPenetration },
  pen_trend:   { title:'Penetration Trend',      sub:'تغير نسبة التغطية عبر الزمن',              render: renderPenetrationTrend },
  performance: { title:'الأداء',                 sub:'تفاصيل أداء اللاينات والمواد',             render: renderPerformance },
};

function navigate(page, el) {
  // Warehouse detail pages
  if (page.startsWith('wh_group_')) {
    const gName = decodeURIComponent(page.replace('wh_group_',''));
    _setTopbar(gName, 'إجمالي المجموعة + تفاصيل الفروع');
    _clearActive();
    renderWhGroupDetail(document.getElementById('content'), gName);
    if (window.innerWidth <= 900) closeSidebar();
    return;
  }
  if (page.startsWith('wh_')) {
    const wName = decodeURIComponent(page.replace('wh_',''));
    _setTopbar(wName, 'تفاصيل المخزن — Stock + Sales + Forecast');
    _clearActive();
    renderWhDetail(document.getElementById('content'), wName);
    if (window.innerWidth <= 900) closeSidebar();
    return;
  }

  const p = PAGES[page];
  if (!p) return;

  _setTopbar(p.title, p.sub);
  _clearActive();
  if (el) el.classList.add('active');

  const content = document.getElementById('content');
  content.innerHTML = '';
  p.render(content);

  if (window.innerWidth <= 900) closeSidebar();
}

function _setTopbar(title, sub) {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-sub').textContent   = sub;
}

function _clearActive() {
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sub-link').forEach(b => b.classList.remove('active'));
}

function toggleMenu(id, btn) {
  const menu   = document.getElementById(id);
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('open'));
  if (!isOpen) { menu.classList.add('open'); btn.classList.add('open'); }
}

function openSidebar()  { document.getElementById('sidebar').classList.add('open');    document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

/* ── Init ── */
document.addEventListener('DOMContentLoaded', function() {
  seedDefaults();
  navigate('dashboard', document.querySelector('.nav-link.active'));
});
