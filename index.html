<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard — Basra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- JS Modules -->


<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">📊</div>
    <div class="logo-text">
      <h2>Sales Dashboard</h2>
      <p>Basra Region • v4</p>
    </div>
  </div>

  <nav class="sidebar-nav">

    <div class="nav-item">
      <button class="nav-link active" onclick="navigate('dashboard',this)">
        <div class="icon">📈</div><span>Dashboard</span>
      </button>
    </div>

    <div class="nav-item">
      <button class="nav-link" onclick="toggleMenu('menu-master',this)">
        <div class="icon">🗂</div><span>Master Data</span><span class="arrow">›</span>
      </button>
      <div class="sub-menu" id="menu-master">
        <button class="sub-link" onclick="navigate('products',this)">المنتجات</button>
        <button class="sub-link" onclick="navigate('pharmacies',this)">الصيدليات</button>
        <button class="sub-link" onclick="navigate('doctors',this)">الأطباء</button>
        <button class="sub-link" onclick="navigate('reps',this)">المندوبين</button>
        <button class="sub-link" onclick="navigate('warehouses',this)">المخازن</button>
        <button class="sub-link" onclick="navigate('regions',this)">المناطق</button>
      </div>
    </div>

    <div class="nav-item">
      <button class="nav-link" onclick="toggleMenu('menu-sales',this)">
        <div class="icon">💰</div><span>Sales</span><span class="arrow">›</span>
      </button>
      <div class="sub-menu" id="menu-sales">
        <button class="sub-link" onclick="navigate('primary',this)">Primary Sales</button>
        <button class="sub-link" onclick="navigate('secondary',this)">Secondary Sales</button>
        <button class="sub-link" onclick="navigate('stock',this)">Stock Entry</button>
        <button class="sub-link" onclick="navigate('orders',this)">Pharmacy Orders</button>
      </div>
    </div>

    <div class="nav-item">
      <button class="nav-link" onclick="toggleMenu('menu-targets',this)">
        <div class="icon">🎯</div><span>Targets & Performance</span><span class="arrow">›</span>
      </button>
      <div class="sub-menu" id="menu-targets">
        <button class="sub-link" onclick="navigate('targets',this)">الأهداف</button>
        <button class="sub-link" onclick="navigate('performance',this)">الأداء</button>
      </div>
    </div>

  </nav>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">👤</div>
      <div class="user-info"><p>Area Manager</p><span>Basra Region</span></div>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title"    id="topbar-title">Dashboard</div>
      <div class="page-subtitle" id="topbar-sub">نظرة عامة على الأداء</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="topbar-btn sidebar-toggle" onclick="openSidebar()"
        style="padding:8px 14px;font-size:12px;font-family:inherit;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer">☰</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="toast">✓ Done</div>

<!-- ═══════════════════ ROUTER ═══════════════════ -->
<script>
const PAGES = {
  dashboard:   { title:'Dashboard',              sub:'نظرة عامة على الأداء',                  render: renderDashboard   },
  products:    { title:'المنتجات',               sub:'إدارة قائمة المنتجات والأهداف',          render: renderProducts    },
  pharmacies:  { title:'الصيدليات',              sub:'إدارة صيدليات المجمعات',                 render: renderPharmacies  },
  doctors:     { title:'الأطباء',                sub:'إدارة قائمة الأطباء',                    render: renderDoctors     },
  reps:        { title:'المندوبين',              sub:'فريق المبيعات',                           render: renderReps        },
  warehouses:  { title:'المخازن',                sub:'إدارة المخازن والمجموعات',               render: renderWarehouses  },
  regions:     { title:'المناطق',                sub:'إدارة المناطق',                           render: renderRegions     },
  primary:     { title:'Primary Sales',          sub:'مبيعات المستودع الشهرية',                render: renderPrimary     },
  secondary:   { title:'Secondary Sales',        sub:'مبيعات الصيدليات — محسوبة من Stock',    render: renderSecondary   },
  stock:       { title:'Stock Entry',            sub:'إدخال أرصدة المخازن — يحسب Secondary',  render: renderStock       },
  orders:      { title:'Pharmacy Orders',        sub:'أوردرات صيدليات المجمعات',               render: renderOrders      },
  targets:     { title:'الأهداف',                sub:'إدارة الأهداف السنوية',                  render: el => el.innerHTML='<div class="fade-up"><div class="card"><h2>🎯 الأهداف</h2><p style="color:var(--muted)">قريباً</p></div></div>' },
  performance: { title:'الأداء',                 sub:'تحليل أداء الفريق',                       render: el => el.innerHTML='<div class="fade-up"><div class="card"><h2>📊 الأداء</h2><p style="color:var(--muted)">قريباً</p></div></div>' },
};

function navigate(page, el) {
  // Warehouse detail pages
  if (page.startsWith('wh_group_')) {
    const gName = decodeURIComponent(page.replace('wh_group_',''));
    _setTopbar(gName, 'إجمالي المجموعة + تفاصيل الفروع');
    _clearActive();
    renderWhGroupDetail(document.getElementById('content'), gName);
    if (window.innerWidth <= 900) closeSidebar();
    return;
  }
  if (page.startsWith('wh_')) {
    const wName = decodeURIComponent(page.replace('wh_',''));
    _setTopbar(wName, 'تفاصيل المخزن — Stock + Sales + Forecast');
    _clearActive();
    renderWhDetail(document.getElementById('content'), wName);
    if (window.innerWidth <= 900) closeSidebar();
    return;
  }

  const p = PAGES[page];
  if (!p) return;

  _setTopbar(p.title, p.sub);
  _clearActive();
  if (el) el.classList.add('active');

  const content = document.getElementById('content');
  content.innerHTML = '';
  p.render(content);

  if (window.innerWidth <= 900) closeSidebar();
}

function _setTopbar(title, sub) {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-sub').textContent   = sub;
}

function _clearActive() {
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sub-link').forEach(b => b.classList.remove('active'));
}

function toggleMenu(id, btn) {
  const menu   = document.getElementById(id);
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('open'));
  if (!isOpen) { menu.classList.add('open'); btn.classList.add('open'); }
}

function openSidebar()  { document.getElementById('sidebar').classList.add('open');    document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

/* ── Init ── */
document.addEventListener('DOMContentLoaded', function() {
  seedDefaults();
  navigate('dashboard', document.querySelector('.nav-link.active'));
});
</script>
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/master.js"></script>
<script src="js/warehouses.js"></script>
<script src="js/sales.js"></script>
<script src="js/orders.js"></script>

</body>
</html>
