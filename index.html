/* ═══════════════════════════════════════
   DB.JS — Storage + Helpers
═══════════════════════════════════════ */

const DB = {
  get:    k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
  getObj: k => { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch { return {}; } },
  set:    (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  setObj: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbw0aMQZrN7xu19d1_V0p9iCSMrTENUdmhC_qzmnVn3_fGha5ZN2ei4n71AZVmdvAJw3fQ/exec';

/* ── Formatters ── */
function fmt(n)  { return Number(n||0).toLocaleString('en'); }
function fmtV(n) { return Number(n||0).toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtSec(n) {
  if (n === '—' || n == null) return '—';
  const abs = Math.abs(n);
  return (n < 0 ? '-' : '') + fmt(abs);
}

/* ── Line color ── */
function lc(line) {
  const m = { Derma:'#4f8ef7', Optha:'#34d399', 'General Line':'#f59e0b', 'CM Line':'#a78bfa' };
  return m[line] || '#64748b';
}

/* ── Detect line from product name ── */
function getLineByProduct(name) {
  name = String(name).toLowerCase();
  if (['acretin','elica','fusibact','hi-quin','hiquin','lamifen','lican','promax','surecure','elicasal'].some(k => name.includes(k))) return 'Derma';
  if (['arox','brimo','brofix','fluca','hyfresh','latano','loxtra','olopat','optidex','optiflox','optifresh','optilone','optipred','tymer','xola','xolamol'].some(k => name.includes(k))) return 'Optha';
  if (['azi-once','azionce','feroton','maxim','prima','fast-flam','relaxon','dompy','fixit','meva','zoron'].some(k => name.includes(k))) return 'General Line';
  if (['vittoria','dapazin','sitagen','sitavic','vildus','lintra'].some(k => name.includes(k))) return 'CM Line';
  return '';
}

/* ── Format date string ── */
function formatDate(d) {
  if (!d) return '—';
  if (d.includes('GMT') || d.includes('00:00:00')) {
    try {
      const x = new Date(d);
      return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
    } catch(e) { return d; }
  }
  return d;
}

/* ── Toast ── */
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── Seed default data if empty ── */
function seedDefaults() {
  if (!DB.get('areas').length) {
    DB.set('areas', ['Basra']);
  }
  if (!DB.get('warehouses').length) {
    DB.set('warehouses', [
      { name:'سيادة',           type:'branch',     group:'سيادة Group', area:'Basra' },
      { name:'خضراء',           type:'branch',     group:'سيادة Group', area:'Basra' },
      { name:'لافندر',          type:'branch',     group:'سيادة Group', area:'Basra' },
      { name:'منهل',            type:'standalone', group:'',            area:'Basra' },
      { name:'اندلس',           type:'standalone', group:'',            area:'Basra' },
      { name:'ساوة',            type:'standalone', group:'',            area:'Basra' },
      { name:'لافقدر',          type:'standalone', group:'',            area:'Basra' },
      { name:'ركن الرافدين',    type:'standalone', group:'',            area:'Basra' },
    ]);
  }
}

/* ═══════════════════════════════════════
   API.JS — Google Sheets JSONP
═══════════════════════════════════════ */

let _cbIdx = 0;

function jsonpRequest(url, cb) {
  const name = `__cb_${++_cbIdx}`;
  window[name] = function(d) { cb(d); delete window[name]; document.getElementById(`s-${name}`)?.remove(); };
  const s = document.createElement('script');
  s.id = `s-${name}`;
  s.src = `${url}&callback=${name}`;
  s.onerror = function() { cb(null); delete window[name]; s.remove(); };
  document.head.appendChild(s);
}

function apiGet(action, params, cb) {
  let url = `${SHEETS_URL}?action=${action}`;
  if (params) Object.entries(params).forEach(([k,v]) => url += `&${k}=${encodeURIComponent(v)}`);
  jsonpRequest(url, cb);
}

function apiPost(body) {
  return fetch(SHEETS_URL, {
    method: 'POST',
    body: JSON.stringify(body),
  }).then(r => r.json());
}

/* ═══════════════════════════════════════
   DASHBOARD.JS — Main Dashboard
═══════════════════════════════════════ */

function renderDashboard(el) {
  const year = new Date().getFullYear();
  const ps   = DB.getObj('primarySales');
  const wf   = DB.getObj('warehouseFlow');

  const psTotal  = Object.entries(ps).filter(([k]) => k.startsWith(year+'__')).reduce((s,[,v]) => s+Number(v), 0);
  const secTotal = Object.entries(wf).filter(([k]) => k.startsWith(year+'__') && !k.includes('__prim') && k.split('__').length === 4).reduce((s,[,v]) => s+Number(v), 0);
  const flowRate = psTotal > 0 ? (secTotal / psTotal * 100).toFixed(1) : '—';

  el.innerHTML = `
    <div class="fade-up">
      <div class="kpi-grid" style="margin-bottom:20px">
        <div class="kpi-card">
          <div class="kpi-label">Primary Sales YTD</div>
          <div class="kpi-value">${fmt(psTotal)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Secondary Sales YTD</div>
          <div class="kpi-value" style="color:var(--accent)">${fmtSec(secTotal)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Flow Rate%</div>
          <div class="kpi-value" style="color:${flowRate>=80?'var(--accent2)':flowRate>=50?'var(--warn)':'var(--danger)'}">${flowRate}%</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">أوردرات المجمعات</div>
          <div class="kpi-value" id="kpi-orders">⏳</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">قيمة الأوردرات</div>
          <div class="kpi-value" id="kpi-orders-val">⏳</div>
        </div>
      </div>

      <div class="card">
        <h2>📦 آخر الأوردرات</h2>
        <div id="dash-orders">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>
    </div>`;

  apiGet('getOrders', {}, function(data) {
    if (!data || !data.success) return;
    const orders = data.orders;

    document.getElementById('kpi-orders').textContent = fmt(orders.length);
    const totalVal = orders.reduce((s,o) => {
      return s + (Number(o.quantity||0) + Number(o.bonusQty||0)) * Number(o.unitPrice||0);
    }, 0);
    document.getElementById('kpi-orders-val').textContent = fmtV(totalVal);

    // Group and show last 5
    const grouped = {};
    orders.forEach(o => {
      const d   = formatDate(o.date);
      const key = `${d}__${o.pharmacy}__${o.rep}`;
      if (!grouped[key]) grouped[key] = { date:d, pharmacy:o.pharmacy, rep:o.rep, total:0, lines:new Set() };
      const line = o.line || getLineByProduct(o.product);
      grouped[key].lines.add(line);
      grouped[key].total += (Number(o.quantity||0) + Number(o.bonusQty||0)) * Number(o.unitPrice||0);
    });

    const recent = Object.values(grouped).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 5);

    document.getElementById('dash-orders').innerHTML = recent.map(o => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:600;font-size:13px">${o.pharmacy}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">👤 ${o.rep||'—'} • 📅 ${o.date}</div>
        </div>
        <div style="text-align:left">
          ${[...o.lines].filter(Boolean).map(l =>
            `<span style="background:${lc(l)}18;color:${lc(l)};border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600;border:1px solid ${lc(l)}30;margin-right:4px">${l}</span>`
          ).join('')}
          <div style="font-size:13px;font-weight:700;color:var(--accent2);margin-top:4px">${fmtV(o.total)}</div>
        </div>
      </div>`).join('') || '<div class="empty">لا توجد بيانات</div>';
  });
}

/* ──────────────────────────────────────

function renderProducts(el) {
  el.innerHTML = `
    <div class="fade-up">
      <div class="card">
        <h2>💊 المنتجات والأهداف</h2>
        <div class="form-grid" style="margin-bottom:14px">
          <div class="form-group"><label>السنة</label>
            <select id="cfg-year" onchange="renderProductsTable()">
              ${[2024,2025,2026,2027,2028].map(y=>`<option${y===2026?' selected':''}>${y}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>المنطقة</label>
            <select id="cfg-area" onchange="renderProductsTable()">
              ${DB.get('areas').map(a=>`<option>${a}</option>`).join('')||'<option>Basra</option>'}
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table><thead><tr>
            <th style="text-align:right">المنتج</th><th>Line</th><th>الهدف السنوي</th><th>السعر</th><th>حذف</th>
          </tr></thead><tbody id="prod-tbody"></tbody></table>
        </div>
      </div>
    </div>`;
  renderProductsTable();
}

function renderProductsTable() {
  const year    = document.getElementById('cfg-year')?.value || 2026;
  const area    = document.getElementById('cfg-area')?.value || 'Basra';
  const prods   = DB.get('products');
  const targets = DB.getObj('productTargets');
  const tbody   = document.getElementById('prod-tbody');
  if (!tbody) return;
  if (!prods.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty">لا توجد منتجات</td></tr>`; return; }
  tbody.innerHTML = prods.map((p,i) => {
    const key    = `${year}__${p.name}__${area}`;
    const target = targets[key] !== undefined ? targets[key] : (area==='Basra' && Number(year)===2026 ? p.annualTarget||0 : 0);
    return `<tr>
      <td style="text-align:right;font-weight:600">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
      </td>
      <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600">${p.line}</span></td>
      <td><input type="number" value="${target}" min="0"
        style="width:90px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
        onchange="saveTarget('${p.name.replace(/'/g,"\\'")}','${year}','${area}',this.value)"></td>
      <td style="color:var(--accent2)">${p.price ? Number(p.price).toLocaleString()+' IQD' : '—'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteProd(${i})">🗑</button></td>
    </tr>`;
  }).join('');
}

function saveTarget(product, year, area, val) {
  const targets = DB.getObj('productTargets');
  targets[`${year}__${product}__${area}`] = Number(val)||0;
  DB.setObj('productTargets', targets);
  toast('✓ تم حفظ الهدف');
}

function deleteProd(i) {
  const prods = DB.get('products');
  if (!prods[i] || !confirm(`حذف ${prods[i].name}؟`)) return;
  prods.splice(i, 1);
  DB.set('products', prods);
  renderProductsTable();
  toast('✓ تم الحذف');
}

function renderPharmacies(el) {
  el.innerHTML = `
    <div class="fade-up">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h2 style="margin:0">🏪 الصيدليات</h2>
          <button class="btn btn-primary btn-sm" onclick="showAddPharmacy()">➕ إضافة</button>
        </div>
        <div id="ph-form" style="display:none;margin-bottom:14px;padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px">
          <div class="form-grid">
            <div class="form-group"><label>الاسم</label><input type="text" id="ph-name" placeholder="اسم الصيدلية"></div>
            <div class="form-group"><label>المنطقة</label>
              <select id="ph-area">${DB.get('areas').map(a=>`<option>${a}</option>`).join('')}</select>
            </div>
            <div class="form-group"><label>الموقع</label><input type="text" id="ph-loc" placeholder="محلة/شارع"></div>
          </div>
          <button class="btn btn-success btn-sm" onclick="addPharmacy()">✓ حفظ</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('ph-form').style.display='none'">إلغاء</button>
        </div>
        <div class="table-wrap">
          <table><thead><tr>
            <th style="text-align:right">الصيدلية</th><th>المنطقة</th><th>الموقع</th><th>حذف</th>
          </tr></thead><tbody id="ph-tbody"></tbody></table>
        </div>
      </div>
    </div>`;
  renderPhTable();
}

function showAddPharmacy() { document.getElementById('ph-form').style.display = 'block'; }

function addPharmacy() {
  const name = document.getElementById('ph-name').value.trim();
  const area = document.getElementById('ph-area').value;
  const loc  = document.getElementById('ph-loc').value.trim();
  if (!name) return alert('ادخل اسم الصيدلية');
  const phs = DB.get('pharmacies');
  if (phs.find(p => p.name === name)) return alert('الصيدلية موجودة');
  phs.push({ name, area, location:loc, doctors:[] });
  DB.set('pharmacies', phs);
  document.getElementById('ph-form').style.display = 'none';
  document.getElementById('ph-name').value = '';
  renderPhTable();
  toast('✓ تم الحفظ');
}

function renderPhTable() {
  const phs   = DB.get('pharmacies');
  const tbody = document.getElementById('ph-tbody');
  if (!phs.length) { tbody.innerHTML = `<tr><td colspan="4" class="empty">لا توجد صيدليات</td></tr>`; return; }
  tbody.innerHTML = phs.map((p,i) => `<tr>
    <td style="text-align:right;font-weight:600">${p.name}</td>
    <td>${p.area||'—'}</td>
    <td style="color:var(--muted);font-size:11px">${p.location||'—'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="deletePh(${i})">🗑</button></td>
  </tr>`).join('');
}

function deletePh(i) {
  const phs = DB.get('pharmacies');
  if (!confirm(`حذف ${phs[i].name}؟`)) return;
  phs.splice(i, 1);
  DB.set('pharmacies', phs);
  renderPhTable();
  toast('✓ تم الحذف');
}

/* ──────────────────────────────────────
   DOCTORS
────────────────────────────────────── */
let _docFilter = 'all';

function renderDoctors(el) {
  const lines = ['all','Derma','Optha','General Line','CM Line'];
  el.innerHTML = `
    <div class="fade-up">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <h2 style="margin:0">👨‍⚕️ الأطباء</h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${lines.map(l => `<button class="btn btn-ghost btn-sm" onclick="filterDocs('${l}',this)">${l==='all'?'الكل':l}</button>`).join('')}

        </div>
        <div class="table-wrap">
          <table><thead><tr>
            <th style="text-align:right">الطبيب</th><th>Line</th><th>المنطقة</th><th>حذف</th>
          </tr></thead><tbody id="doc-tbody"></tbody></table>
        </div>
      </div>
    </div>`;
  renderDocTable('all');
}

function filterDocs(line, btn) {
  _docFilter = line;
  document.querySelectorAll('#content .btn-ghost').forEach(b => b.style.borderColor = '');
  if (btn) btn.style.borderColor = 'var(--accent)';
  renderDocTable(line);
}

function renderDocTable(line) {
  let docs = DB.get('doctors');
  if (line !== 'all') docs = docs.filter(d => d.line === line);
  const tbody = document.getElementById('doc-tbody');
  if (!docs.length) { tbody.innerHTML = `<tr><td colspan="4" class="empty">لا توجد بيانات</td></tr>`; return; }
  tbody.innerHTML = docs.map(d => `<tr>
    <td style="text-align:right;font-weight:600">${d.name}</td>
    <td><span style="background:${lc(d.line)}18;color:${lc(d.line)};border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600">${d.line}</span></td>
    <td style="color:var(--muted)">${d.area||'—'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteDoc('${d.name.replace(/'/g,"\\'")}')">🗑</button></td>
  </tr>`).join('');
}

function deleteDoc(name) {
  if (!confirm(`حذف ${name}؟`)) return;
  DB.set('doctors', DB.get('doctors').filter(d => d.name !== name));
  renderDocTable(_docFilter);
  toast('✓ تم الحذف');
}

/* ──────────────────────────────────────
   REPS
────────────────────────────────────── */
function renderReps(el) {
  el.innerHTML = `
    <div class="fade-up">
      <div class="card">
        <h2>👥 المندوبين</h2>
        <div id="reps-content"><div class="loader"><div class="spinner"></div></div></div>
      </div>
    </div>`;
  apiGet('getOrders', {}, function(data) {
    if (!data || !data.success) {
      document.getElementById('reps-content').innerHTML = '<div class="empty">تعذر التحميل</div>';
      return;
    }
    const reps = [...new Set(data.orders.map(o => o.rep).filter(Boolean))];
    const stats = {};
    data.orders.forEach(o => {
      if (!stats[o.rep]) stats[o.rep] = { orders:0, value:0 };
      stats[o.rep].orders++;
      stats[o.rep].value += Number(o.quantity||0) * Number(o.unitPrice||0);
    });
    let rows = reps.map(r =>
      '<tr><td style="text-align:right;font-weight:600">👤 '+r+'</td><td>'+fmt(stats[r].orders)+'</td><td style="color:var(--accent2);font-weight:600">'+fmtV(stats[r].value)+'</td></tr>'
    ).join('');
    document.getElementById('reps-content').innerHTML =
      '<div class="table-wrap"><table><thead><tr><th style="text-align:right">المندوب</th><th>الفواتير</th><th>القيمة</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  });
}

   REGIONS

function renderRegions(el) {
  el.innerHTML = `
    <div class="fade-up">
      <div class="card">
        <h2>📍 المناطق</h2>
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <input type="text" id="area-input" placeholder="اسم المنطقة"
            style="background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:12px;font-size:13px;font-family:inherit;outline:none;flex:1">
          <button class="btn btn-primary" onclick="addArea()">➕ إضافة</button>
        </div>
        <div id="areas-list" style="display:flex;flex-wrap:wrap;gap:8px"></div>
      </div>
    </div>`;
  renderAreasList();
}

function renderAreasList() {
  const areas = DB.get('areas');
  document.getElementById('areas-list').innerHTML = areas.map((a,i) => `
    <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:999px;padding:7px 14px">
      <span>📍 ${a}</span>
      <button onclick="deleteArea(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;line-height:1">✕</button>
    </div>`).join('') || '<span style="color:var(--muted);font-size:12px">لا توجد مناطق</span>';
}

function addArea() {
  const val = document.getElementById('area-input').value.trim();
  if (!val) return;
  const areas = DB.get('areas');
  if (areas.includes(val)) return alert('المنطقة موجودة');
  areas.push(val);
  DB.set('areas', areas);
  document.getElementById('area-input').value = '';
  renderAreasList();
  toast('✓ تم الحفظ');
}

function deleteArea(i) {
  const areas = DB.get('areas');
  if (!confirm(`حذف ${areas[i]}؟`)) return;
  areas.splice(i, 1);
  DB.set('areas', areas);
  renderAreasList();
}

function getWhStats(whName) {
  const stock = DB.getObj('stockEntry');
  const wf    = DB.getObj('warehouseFlow');
  const ps    = DB.getObj('primarySales');
  const year  = new Date().getFullYear();

  let latestStock = 0, latestMonth = 0, secondary = 0, primary = 0;

  // آخر closing stock
  Object.entries(stock).forEach(([k,v]) => {
    if (k.includes(`__${whName}`) && !k.endsWith('__prim')) {
      const parts = k.split('__');
      const m = Number(parts[3]);
      if (Number(parts[0]) === year && m >= latestMonth) {
        latestMonth = m;
        latestStock = Number(v.close || 0);
      }
    }
  });

  // Secondary YTD
  Object.entries(wf).forEach(([k,v]) => {
    if (k.startsWith(year+'__') && k.includes(`__${whName}`)) secondary += Number(v||0);
  });

  // Primary YTD
  Object.entries(ps).forEach(([k,v]) => {
    if (k.startsWith(year+'__')) primary += Number(v||0);
  });

  const flow       = primary > 0 ? (secondary / primary * 100) : 0;
  const avgMonthly = latestMonth > 0 ? secondary / latestMonth : 0;
  const forecast   = avgMonthly > 0 ? Math.round(latestStock / avgMonthly * 30) : 0;

  return { stock:latestStock, secondary, primary, flow, forecast };
}

function getWhGroupStats(whNames) {
  let stock = 0, secondary = 0, primary = 0;
  whNames.forEach(n => {
    const s = getWhStats(n);
    stock += s.stock; secondary += s.secondary; primary += s.primary;
  });
  const flow = primary > 0 ? (secondary / primary * 100) : 0;
  return { stock, secondary, primary, flow };
}

function flowColor(f) {
  return f >= 80 ? 'var(--accent2)' : f >= 50 ? 'var(--warn)' : 'var(--danger)';
}

function addWarehouse() {
  const name  = document.getElementById('wh-name').value.trim();
  const type  = document.getElementById('wh-type').value;
  const group = document.getElementById('wh-group')?.value.trim() || '';
  const area  = document.getElementById('wh-area').value;
  if (!name) return alert('ادخل اسم المخزن');
  const whs = DB.get('warehouses') || [];
  if (whs.find(w => w.name === name)) return alert('المخزن موجود');
  whs.push({ name, type, group: type==='branch' ? group : '', area });
  DB.set('warehouses', whs);
  document.getElementById('wh-form').style.display = 'none';
  document.getElementById('wh-name').value = '';
  renderWhList();
  toast('✓ تم الحفظ');
}

function deleteWarehouse(i) {
  const whs = DB.get('warehouses') || [];
  if (!confirm(`حذف ${whs[i].name}؟`)) return;
  whs.splice(i, 1);
  DB.set('warehouses', whs);
  renderWhList();
  toast('✓ تم الحذف');
}

function editWarehouse(i) {
  const whs = DB.get('warehouses') || [];
  const w   = whs[i]; if (!w) return;
  const newName  = prompt('اسم المخزن:', w.name);    if (newName === null) return;
  const newType  = prompt('النوع (standalone/branch):', w.type); if (newType === null) return;
  let   newGroup = '';
  if (newType === 'branch') newGroup = prompt('المجموعة:', w.group) || '';
  const newArea  = prompt('المنطقة:', w.area || 'Basra'); if (newArea === null) return;
  whs[i] = { name:newName.trim(), type:newType, group:newGroup, area:newArea };
  DB.set('warehouses', whs);
  renderWhList();
  toast('✓ تم التحديث');
}

/* ── Warehouse Detail ── */
function renderWhDetail(el, whName) {
  const stats = getWhStats(whName);
  const prods = DB.get('products');
  const stock = DB.getObj('stockEntry');
  const wf    = DB.getObj('warehouseFlow');
  const ps    = DB.getObj('primarySales');
  const year  = new Date().getFullYear();

  const prodData = prods.map(p => {
    let closing = 0, opening = 0, lastMonth = 0;
    Object.entries(stock).forEach(([k,v]) => {
      if (k.includes(`__${p.name}__`) && k.includes(`__${whName}`) && !k.endsWith('__prim')) {
        const parts = k.split('__');
        const m = Number(parts[3]);
        if (Number(parts[0]) === year && m >= lastMonth) {
          lastMonth = m; closing = Number(v.close||0); opening = Number(v.open||0);
        }
      }
    });
    let sec = 0;
    Object.entries(wf).forEach(([k,v]) => {
      if (k.startsWith(`${year}__${p.name}__`) && k.includes(`__${whName}`)) sec += Number(v||0);
    });
    let pri = 0;
    Object.entries(ps).forEach(([k,v]) => {
      if (k.startsWith(`${year}__${p.name}__`)) pri += Number(v||0);
    });
    const flow = pri > 0 ? (sec / pri * 100) : 0;
    const avg  = lastMonth > 0 ? sec / lastMonth : 0;
    const fore = avg > 0 ? Math.round(closing / avg * 30) : 0;
    return { name:p.name, line:p.line, opening, closing, sec, pri, flow, fore };
  }).filter(p => p.closing > 0 || p.sec !== 0 || p.pri > 0 || true);

  el.innerHTML = `
    <div class="fade-up">
      <button class="btn btn-ghost btn-sm" onclick="navigate('warehouses',null)" style="margin-bottom:14px">← رجوع</button>
      <div class="kpi-grid" style="margin-bottom:16px">

        <div class="kpi-card"><div class="kpi-label">Primary YTD</div><div class="kpi-value" style="color:var(--muted)">${fmt(stats.primary)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Flow%</div><div class="kpi-value" style="color:${flowColor(stats.flow)}">${stats.flow.toFixed(1)}%</div></div>
        <div class="kpi-card"><div class="kpi-label">Forecast</div><div class="kpi-value" style="color:var(--warn)">${stats.forecast > 0 ? stats.forecast+'d' : '—'}</div></div>
      </div>
      <div class="card">
        <h2>💊 تفاصيل المواد</h2>
        ${prodData.length ? `
        <div class="table-wrap"><table>
          <thead><tr>
            <th style="text-align:right">المادة</th><th>Line</th>
            <th>Opening</th><th>Closing</th><th>Secondary</th><th>Primary</th><th>Flow%</th><th>Forecast</th>
          </tr></thead><tbody>
          ${prodData.map(p => `<tr>
            <td style="text-align:right;font-weight:600">${p.name}</td>
            <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
            <td>${fmt(p.opening)}</td>
            <td style="color:var(--accent2);font-weight:700">${fmt(p.closing)}</td>
            <td style="color:${p.sec<0?'var(--danger)':p.sec>0?'var(--accent)':'var(--muted)'};font-weight:700">${fmtSec(p.sec)}</td>
            <td style="color:var(--muted)">${fmt(p.pri)}</td>
            <td style="color:${flowColor(p.flow)}">${p.flow.toFixed(1)}%</td>
            <td style="color:var(--warn);font-weight:600">${p.fore > 0 ? p.fore+'d' : '—'}</td>
          </tr>`).join('')}
          </tbody></table></div>`
        : '<div class="empty">لا توجد بيانات — أدخل Stock Entry لهذا المخزن</div>'}
      </div>
    </div>`;
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

/* ──────────────────────────────────────

function renderPrimary(el) {
  const cur = new Date();
  el.innerHTML = `
    <div class="fade-up">
      <div class="card">
        <h2>📥 Primary Sales — إدخال شهري</h2>
        <div class="form-grid" style="margin-bottom:12px">

              <option value="all">All Lines</option>

            </select>
          </div>
        </div>
        <input type="text" id="ps-search" placeholder="🔍 Search product..." oninput="filterPS()"
          style="width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px">
        <button class="btn btn-primary btn-sm" onclick="savePSGrid()" style="margin-bottom:12px">💾 Save All</button>

      </div>
    </div>`;

function renderPSGrid() {
  const year  = document.getElementById('ps-year')?.value;
  const month = document.getElementById('ps-month')?.value;
  const area  = document.getElementById('ps-area')?.value || 'Basra';
  const line  = document.getElementById('ps-line')?.value || 'all';
  if (!year || !month) return;
  const prods   = DB.get('products').filter(p => line==='all' || p.line===line);
  const ps      = DB.getObj('primarySales');
  const targets = DB.getObj('productTargets');
  const tbody   = document.getElementById('ps-tbody');
  if (!tbody) return;
  tbody.innerHTML = prods.map(p => {
    const key    = `${year}__${p.name}__${area}__${month}`;
    const val    = ps[key] || 0;
    const tKey   = `${year}__${p.name}__${area}`;
    const ann    = targets[tKey] !== undefined ? targets[tKey] : (area==='Basra' && Number(year)===2026 ? p.annualTarget||0 : 0);
    const mTarget = Math.round(ann / 12);
    return `<tr>
      <td style="text-align:right;font-weight:600">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
      </td>
      <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
      <td style="color:var(--muted)">${fmt(mTarget)}</td>
      <td><input type="number" class="ps-input" data-key="${key}" value="${val}" min="0"
        style="width:90px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
        placeholder="0"></td>
    </tr>`;
  }).join('');
}

function filterPS() {
  const q = document.getElementById('ps-search')?.value.toLowerCase() || '';
  document.querySelectorAll('#ps-tbody tr').forEach(row => {
    row.style.display = row.querySelector('td')?.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function savePSGrid() {
  const data = DB.getObj('primarySales');
  document.querySelectorAll('.ps-input').forEach(inp => {
    const val = Number(inp.value || 0);
    if (val > 0) data[inp.dataset.key] = val;
    else delete data[inp.dataset.key];
  });
  DB.setObj('primarySales', data);
  toast('✓ Primary Sales saved');
}

function renderSecGrid() {
  const year  = document.getElementById('sec-year')?.value;
  const month = document.getElementById('sec-month')?.value;
  const area  = document.getElementById('sec-area')?.value || 'Basra';
  const line  = document.getElementById('sec-line')?.value || 'all';
  if (!year || !month) return;

  const prods = DB.get('products').filter(p => line==='all' || p.line===line);
  const stock = DB.getObj('stockEntry');
  const ps    = DB.getObj('primarySales');
  const whs   = DB.get('warehouses') || [];
  const tbody = document.getElementById('sec-tbody');
  if (!tbody) return;

  tbody.innerHTML = prods.map(p => {
    const psKey  = `${year}__${p.name}__${area}__${month}`;
    const primary = Number(ps[psKey] || 0);

    // Secondary per warehouse
    const whSecs = whs.map(w => {
      const stKey = `${year}__${p.name}__${area}__${month}__${w.name}`;
      const saved = stock[stKey] || { open:null, close:null };
      const primStKey = `${stKey}__prim`;
      const whPrim = stock[primStKey] != null ? stock[primStKey] : primary;
      if (saved.open == null && saved.close == null) return null;
      return Number(saved.open||0) + whPrim - Number(saved.close||0);
    });

    const totalSec = whSecs.reduce((s,v) => s + (v != null ? v : 0), 0);
    const flow = primary > 0 ? (totalSec / primary * 100) : 0;

    return `<tr>
      <td style="text-align:right;font-weight:600">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
      </td>
      <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
      <td style="color:var(--muted)">${fmt(primary)}</td>
      ${whSecs.map(v => `<td style="color:${v==null?'var(--muted)':v<0?'var(--danger)':v>0?'var(--accent)':'var(--muted)'};font-weight:600">${v==null?'—':fmtSec(v)}</td>`).join('')}
      <td style="color:${totalSec<0?'var(--danger)':totalSec>0?'var(--accent2)':'var(--muted)'};font-weight:700;font-size:14px">${fmtSec(totalSec)}</td>
      <td style="color:${flow>=80?'var(--accent2)':flow>=50?'var(--warn)':'var(--danger)'}">${flow.toFixed(1)}%</td>
    </tr>`;
  }).join('');
}

function renderStockGrid() {
  const year      = document.getElementById('st-year')?.value;
  const month     = document.getElementById('st-month')?.value;
  const area      = document.getElementById('st-area')?.value || 'Basra';
  const warehouse = document.getElementById('st-warehouse')?.value || '';
  const line      = document.getElementById('st-line')?.value || 'all';
  if (!year || !month) return;

  const warn = document.getElementById('st-warn');
  if (warn) warn.style.display = warehouse ? 'none' : 'block';

  const prods = DB.get('products').filter(p => line==='all' || p.line===line);
  const stock = DB.getObj('stockEntry');
  const ps    = DB.getObj('primarySales');
  const tbody = document.getElementById('st-tbody');
  if (!tbody) return;

  tbody.innerHTML = prods.map(p => {
    const psKey  = `${year}__${p.name}__${area}__${month}`;
    const primary = Number(ps[psKey] || 0);
    const stKey  = warehouse ? `${year}__${p.name}__${area}__${month}__${warehouse}` : `${year}__${p.name}__${area}__${month}`;
    const saved  = stock[stKey] || { open:null, close:null };

    // Auto-fill opening from previous month closing
    let autoOpen = null;
    if (saved.open == null) {
      const prevMonth = Number(month) === 1 ? 12 : Number(month) - 1;
      const prevYear  = Number(month) === 1 ? Number(year) - 1 : year;
      const prevKey   = warehouse ? `${prevYear}__${p.name}__${area}__${prevMonth}__${warehouse}` : `${prevYear}__${p.name}__${area}__${prevMonth}`;
      const prev = stock[prevKey];
      if (prev?.close != null) autoOpen = prev.close;
    }

    const open  = saved.open  != null ? saved.open  : autoOpen;
    const close = saved.close != null ? saved.close : null;

    // Saved warehouse-specific primary
    const primStKey = `${stKey}__prim`;
    const savedPrim = stock[primStKey] != null ? stock[primStKey] : null;
    const effPrim   = savedPrim != null ? savedPrim : primary;

    const secondary = open != null && close != null ? open + effPrim - close : '—';

    return `<tr data-key="${stKey}" data-pskey="${psKey}" data-primkey="${primStKey}">
      <td style="text-align:right;font-weight:600">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
      </td>
      <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
      <td>
        <input type="number" class="st-open" value="${open != null ? open : ''}" min="0"
          style="width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
          placeholder="0" oninput="calcSec(this,'${stKey}','${psKey}','${primStKey}')">
      </td>
      <td>
        <input type="number" class="st-primary" value="${savedPrim != null ? savedPrim : ''}" min="0"
          style="width:80px;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
          placeholder="${fmt(primary)}" oninput="calcSec(this,'${stKey}','${psKey}','${primStKey}')">
      </td>
      <td>
        <input type="number" class="st-close" value="${close != null ? close : ''}" min="0"
          style="width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
          placeholder="0" oninput="calcSec(this,'${stKey}','${psKey}','${primStKey}')">
      </td>
      <td id="sec-${stKey.replace(/[^a-zA-Z0-9]/g,'_')}"
        style="font-weight:700;font-size:14px;color:${secondary==='—'?'var(--muted)':secondary<0?'var(--danger)':secondary>0?'var(--accent2)':'var(--muted)'}">
        ${secondary === '—' ? '—' : fmtSec(secondary)}
      </td>
    </tr>`;
  }).join('');
}

function calcSec(inp, stKey, psKey, primStKey) {
  const row      = inp.closest('tr');
  const openVal  = row.querySelector('.st-open')?.value;
  const closeVal = row.querySelector('.st-close')?.value;
  const primVal  = row.querySelector('.st-primary')?.value;
  const safeId   = stKey.replace(/[^a-zA-Z0-9]/g, '_');
  const el       = document.getElementById(`sec-${safeId}`);
  if (!el) return;
  if (openVal === '' || closeVal === '') {
    el.textContent = '—';
    el.style.color = 'var(--muted)';
    return;
  }
  const ps      = DB.getObj('primarySales');
  const primary = Number(ps[psKey] || 0);
  const effPrim = primVal !== '' ? Number(primVal) : primary;
  const sec     = Number(openVal) + effPrim - Number(closeVal);
  el.textContent = fmtSec(sec);
  el.style.color = sec > 0 ? 'var(--accent2)' : sec < 0 ? 'var(--danger)' : 'var(--muted)';
}

function filterStock() {
  const q = document.getElementById('st-search')?.value.toLowerCase() || '';
  document.querySelectorAll('#st-tbody tr').forEach(row => {
    row.style.display = row.querySelector('td')?.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function saveStockGrid() {
  const stock   = DB.getObj('stockEntry');
  const wf      = DB.getObj('warehouseFlow');
  const ps      = DB.getObj('primarySales');
  const year    = document.getElementById('st-year')?.value;
  const month   = document.getElementById('st-month')?.value;
  const area    = document.getElementById('st-area')?.value || 'Basra';
  const wh      = document.getElementById('st-warehouse')?.value || '';
  const entries = [];

  document.querySelectorAll('#st-tbody tr').forEach(row => {
    const stKey    = row.dataset.key;
    const psKey    = row.dataset.pskey;
    const primStKey= row.dataset.primkey;
    if (!stKey) return;

    const openVal  = row.querySelector('.st-open')?.value;
    const closeVal = row.querySelector('.st-close')?.value;
    const primVal  = row.querySelector('.st-primary')?.value;
    if ((openVal === '' || openVal == null) && (closeVal === '' || closeVal == null)) return;

    const openNum  = openVal  !== '' && openVal  != null ? Number(openVal)  : null;
    const closeNum = closeVal !== '' && closeVal != null ? Number(closeVal) : null;
    const primNum  = primVal  !== '' && primVal  != null ? Number(primVal)  : null;

    // Save primary override
    if (primNum != null) stock[primStKey] = primNum;
    else delete stock[primStKey];

    const defPrimary = Number(ps[psKey] || 0);
    const effPrimary = primNum != null ? primNum : defPrimary;
    const secondary  = openNum != null && closeNum != null ? openNum + effPrimary - closeNum : 0;

    stock[stKey] = { open:openNum, close:closeNum };

    // Update warehouseFlow — sum this warehouse's contribution
    wf[`${psKey}__${wh}`] = secondary;

    // Recalculate total secondary for this product/month (all warehouses)
    const allWhKeys = Object.keys(wf).filter(k => k.startsWith(psKey + '__'));
    const totalSec  = allWhKeys.reduce((s, k) => s + Number(wf[k] || 0), 0);
    wf[psKey] = totalSec;

    // Prepare for Sheets
    const productName = row.cells[row.cells.length - 1]?.textContent?.trim().replace(/^\W+/, '').trim() || '';
    entries.push({
      year, month, area,
      warehouse: wh,
      product:   productName,
      line:      row.querySelector('span[style*="border-radius"]')?.textContent || '',
      opening:   openNum  || 0,
      closing:   closeNum || 0,
      primary:   effPrimary,
      secondary,
    });
  });

  DB.setObj('stockEntry', stock);
  DB.setObj('warehouseFlow', wf);

  // Send to Sheets
  if (entries.length) {
    apiPost({ action:'saveStock', entries })
      .then(d => {
        if (d.success) toast(`✓ Saved — ${d.rowsAdded} added, ${d.rowsUpdated} updated`);
        else toast('⚠ Sheets error: ' + d.error);
      })
      .catch(() => toast('✓ Saved locally (Sheets offline)'));
  } else {
    toast('✓ Saved locally');
  }

  renderStockGrid();
}

function _loadOrders() {
  apiGet('getOrders', {}, function(data) {
    if (!data || !data.success) {
      document.getElementById('ord-list').innerHTML = '<div class="empty">⚠ Failed to load orders</div>';
      return;
    }

    // Group by date+pharmacy+rep+warehouse
    const grouped = {};
    data.orders.forEach(o => {
      const d   = formatDate(o.date);
      const key = `${d}__${o.pharmacy}__${o.rep}__${o.warehouse}`;
      if (!grouped[key]) grouped[key] = { id:key, date:d, rep:o.rep, pharmacy:o.pharmacy, warehouse:o.warehouse, items:[] };
      const line = o.line || getLineByProduct(o.product);
      grouped[key].items.push({
        product:o.product, line,
        qty:Number(o.quantity||0), price:Number(o.unitPrice||0),
        bonusPct:o.bonusPct, bonusQty:Number(o.bonusQty||0),
      });
    });

    _allOrders = Object.values(grouped).sort((a,b) => b.date.localeCompare(a.date));

    // Populate filter dropdowns
    const reps = [...new Set(_allOrders.map(o => o.rep).filter(Boolean))];
    const phs  = [...new Set(_allOrders.map(o => o.pharmacy).filter(Boolean))];
    const repEl = document.getElementById('f-rep');
    const phEl  = document.getElementById('f-ph');
    if (repEl) repEl.innerHTML = '<option value="">All Reps</option>' + reps.map(r=>`<option>${r}</option>`).join('');
    if (phEl)  phEl.innerHTML  = '<option value="">All Pharmacies</option>' + phs.map(p=>`<option>${p}</option>`).join('');

    applyOrderFilters();
  });
}

function applyOrderFilters() {
  const repF  = document.getElementById('f-rep')?.value       || '';
  const phF   = document.getElementById('f-ph')?.value        || '';
  const lineF = document.getElementById('f-line')?.value      || '';
  const whF   = document.getElementById('f-warehouse')?.value || '';
  const from  = document.getElementById('f-date-from')?.value || '';
  const to    = document.getElementById('f-date-to')?.value   || '';

  const filtered = _allOrders.filter(o => {
    if (repF  && o.rep       !== repF)  return false;
    if (phF   && o.pharmacy  !== phF)   return false;
    if (lineF && !o.items.some(i => i.line === lineF)) return false;
    if (whF   && o.warehouse !== whF)   return false;
    if (from  && o.date < from)         return false;
    if (to    && o.date > to)           return false;
    return true;
  });

  // Stats
  const tQty  = filtered.reduce((s,o) => o.items.reduce((ss,i) => ss+i.qty, 0)+s, 0);
  const tBon  = filtered.reduce((s,o) => o.items.reduce((ss,i) => ss+i.bonusQty, 0)+s, 0);
  const tOrd  = filtered.reduce((s,o) => o.items.reduce((ss,i) => ss+(i.qty*i.price), 0)+s, 0);
  const tBonV = filtered.reduce((s,o) => o.items.reduce((ss,i) => ss+(i.bonusQty*i.price), 0)+s, 0);

  const statsEl = document.getElementById('ord-stats');
  if (statsEl) statsEl.innerHTML = `
    <div class="stat-mini">Orders <span>${filtered.length}</span></div>
    <div class="stat-mini">Qty <span>${fmt(tQty)}</span></div>
    <div class="stat-mini">Bonus Qty <span>${fmt(tBon)}</span></div>
    <div class="stat-mini">Order Value <span>${fmtV(tOrd)}</span></div>
    <div class="stat-mini">Bonus Value <span>${fmtV(tBonV)}</span></div>
    <div class="stat-mini">Total <span>${fmtV(tOrd+tBonV)}</span></div>
  `;

  const container = document.getElementById('ord-list');
  if (!container) return;
  if (!filtered.length) { container.innerHTML = '<div class="empty">No orders found</div>'; return; }

  // Table view for single pharmacy or warehouse
  if (phF || whF) {
    const label = phF || whF;
    const icon  = phF ? '🏪' : '🏭';
    const items = [];
    filtered.forEach(o => {
      o.items.forEach(i => items.push({...i, date:o.date, rep:o.rep, pharmacy:o.pharmacy, warehouse:o.warehouse}));
    });
    const totOrd = items.reduce((s,i) => s+(i.qty*i.price), 0);
    const totBon = items.reduce((s,i) => s+(i.bonusQty*i.price), 0);

    container.innerHTML = `
      <div class="card fade-up">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
          <h2 style="margin:0">${icon} ${label}</h2>
          <div style="display:flex;gap:14px;font-size:12px;flex-wrap:wrap">
            <span style="color:var(--accent2)">Order Value: <strong>${fmtV(totOrd)}</strong></span>
            <span style="color:var(--warn)">Bonus: <strong>${fmtV(totBon)}</strong></span>
            <span style="color:#fff;font-weight:700">Total: ${fmtV(totOrd+totBon)}</span>
          </div>
        </div>
        <div class="table-wrap">
          <table><thead><tr>
            <th>Date</th>
            ${!phF ? '<th style="text-align:right">Pharmacy</th>' : ''}
            <th style="text-align:right">Product</th>
            <th>Line</th><th>Rep</th>
            ${!whF ? '<th>Warehouse</th>' : ''}
            <th>Qty</th><th>Price</th><th>Order Value</th>
            <th>Bonus%</th><th>Bonus Qty</th><th>Bonus Value</th><th>Total</th>
          </tr></thead><tbody>
            ${items.map(i => {
              const iOrd = i.qty * i.price;
              const iBon = i.bonusQty * i.price;
              return `<tr>
                <td style="color:var(--muted);white-space:nowrap">${i.date}</td>
                ${!phF ? `<td style="text-align:right;font-weight:600;white-space:nowrap">${i.pharmacy}</td>` : ''}
                <td style="text-align:right;font-weight:600;white-space:nowrap">${i.product}</td>
                <td>${i.line ? `<span style="background:${lc(i.line)}18;color:${lc(i.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${i.line}</span>` : '—'}</td>

                <td style="font-weight:700">${fmt(i.qty)}</td>
                <td>${fmtV(i.price)}</td>
                <td style="color:var(--accent2);font-weight:700">${fmtV(iOrd)}</td>
                <td style="color:var(--muted)">${i.bonusPct||0}%</td>

                <td style="color:#fff;font-weight:700;background:rgba(255,255,255,.04)">${fmtV(iOrd+iBon)}</td>
              </tr>`;
            }).join('')}
            <tr style="background:rgba(255,255,255,.06);font-weight:700">
              <td colspan="${4 + (!phF?1:0) + (!whF?1:0)}" style="text-align:right;color:var(--muted)">Total</td>
              <td style="color:var(--accent2)">${fmtV(totOrd)}</td>
              <td></td>
              <td style="color:var(--warn)">${fmt(items.reduce((s,i)=>s+i.bonusQty,0))}</td>
              <td style="color:var(--warn)">${fmtV(totBon)}</td>
              <td style="color:#fff">${fmtV(totOrd+totBon)}</td>
            </tr>
          </tbody></table>
        </div>
      </div>`;
    return;
  }

  // Cards view
  container.innerHTML = filtered.map((o, oi) => {
    const lines   = [...new Set(o.items.map(i => i.line).filter(Boolean))];
    const ordVal  = o.items.reduce((s,i) => s+(i.qty*i.price), 0);
    const bonVal  = o.items.reduce((s,i) => s+(i.bonusQty*i.price), 0);
    const id      = `ord_${oi}`;
    return `<div class="order-card">
      <div class="order-head" onclick="document.getElementById('ob-${id}').classList.toggle('open')">
        <div class="order-info">
          <span style="font-size:14px;font-weight:700;color:#fff">${o.pharmacy}</span>
          ${o.rep       ? `<span class="pill">👤 ${o.rep}</span>`       : ''}
          ${o.warehouse ? `<span class="pill">🏭 ${o.warehouse}</span>` : ''}
          <span class="pill">📅 ${o.date}</span>
          ${lines.map(l => `<span style="background:${lc(l)}18;color:${lc(l)};border:1px solid ${lc(l)}33;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:700">${l}</span>`).join('')}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          <span style="font-size:11px;color:var(--accent2)">Order: <strong>${fmtV(ordVal)}</strong></span>
          <span style="font-size:11px;color:var(--warn)">Bonus: <strong>${fmtV(bonVal)}</strong></span>
          <span style="font-size:12px;color:#fff;font-weight:700">Total: ${fmtV(ordVal+bonVal)}</span>
        </div>
      </div>
      <div class="order-body" id="ob-${id}">
        <div class="table-wrap">
          <table><thead><tr>
            <th style="text-align:right">Product</th><th>Line</th>
            <th>Qty</th><th>Price</th><th>Order Value</th>
            <th>Bonus%</th><th>Bonus Qty</th><th>Bonus Value</th><th>Total</th>
          </tr></thead><tbody>
            ${o.items.map(i => {
              const iOrd = i.qty * i.price;
              const iBon = i.bonusQty * i.price;
              return `<tr>
                <td style="text-align:right;font-weight:600;white-space:nowrap">${i.product}</td>
                <td>${i.line ? `<span style="background:${lc(i.line)}18;color:${lc(i.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${i.line}</span>` : '—'}</td>
                <td style="font-weight:700">${fmt(i.qty)}</td>
                <td>${fmtV(i.price)}</td>
                <td style="color:var(--accent2);font-weight:700">${fmtV(iOrd)}</td>
                <td style="color:var(--muted)">${i.bonusPct||0}%</td>
                <td style="color:var(--warn);font-weight:700">${fmt(i.bonusQty||0)}</td>
                <td style="color:var(--warn);font-weight:700">${fmtV(iBon)}</td>
                <td style="color:#fff;font-weight:700;background:rgba(255,255,255,.04)">${fmtV(iOrd+iBon)}</td>
              </tr>`;
            }).join('')}
            <tr style="background:rgba(255,255,255,.04);font-weight:700">
              <td colspan="4" style="text-align:right;color:var(--muted)">Total</td>
              <td style="color:var(--accent2)">${fmtV(ordVal)}</td>
              <td></td>
              <td style="color:var(--warn)">${fmt(o.items.reduce((s,i)=>s+i.bonusQty,0))}</td>
              <td style="color:var(--warn)">${fmtV(bonVal)}</td>
              <td style="color:#fff">${fmtV(ordVal+bonVal)}</td>
            </tr>
          </tbody></table>
        </div>
      </div>
    </div>`;
  }).join('');
}

function clearOrdFilters() {
  ['f-rep','f-ph','f-line','f-warehouse','f-region','f-date-from','f-date-to'].forEach(id => {

  doctors:     { title:'الأطباء',                sub:'إدارة قائمة الأطباء',                    render: renderDoctors     },
  reps:        { title:'المندوبين',              sub:'فريق المبيعات',                           render: renderReps        },
  warehouses:  { title:'المخازن',                sub:'إدارة المخازن والمجموعات',               render: renderWarehouses  },
  regions:     { title:'المناطق',                sub:'إدارة المناطق',                           render: renderRegions     },
  primary:     { title:'Primary Sales',          sub:'مبيعات المستودع الشهرية',                render: renderPrimary     },
  secondary:   { title:'Secondary Sales',        sub:'مبيعات الصيدليات — محسوبة من Stock',    render: renderSecondary   },
  stock:       { title:'Stock Entry',            sub:'إدخال أرصدة المخازن — يحسب Secondary',  render: renderStock       },
  orders:      { title:'Pharmacy Orders',        sub:'أوردرات صيدليات المجمعات',               render: renderOrders      },
  targets:     { title:'الأهداف',                sub:'إدارة الأهداف السنوية',                  render: el => el.innerHTML='<div class="fade-up"><div class="card"><h2>🎯 الأهداف</h2><p style="color:var(--muted)">قريباً</p></div></div>' },
  performance: { title:'الأداء',                 sub:'تحليل أداء الفريق',                       render: el => el.innerHTML='<div class="fade-up"><div class="card"><h2>📊 الأداء</h2><p style="color:var(--muted)">قريباً</p></div></div>' },
};

function navigate(page, el) {
  // Warehouse detail pages
  if (page.startsWith('wh_group_')) {
    const gName = decodeURIComponent(page.replace('wh_group_',''));
    _setTopbar(gName, 'إجمالي المجموعة + تفاصيل الفروع');
    _clearActive();
    renderWhGroupDetail(document.getElementById('content'), gName);
    if (window.innerWidth <= 900) closeSidebar();
    return;
  }
  if (page.startsWith('wh_')) {
    const wName = decodeURIComponent(page.replace('wh_',''));
    _setTopbar(wName, 'تفاصيل المخزن — Stock + Sales + Forecast');
    _clearActive();
    renderWhDetail(document.getElementById('content'), wName);
    if (window.innerWidth <= 900) closeSidebar();
    return;
  }

  const p = PAGES[page];
  if (!p) return;

  _setTopbar(p.title, p.sub);
  _clearActive();
  if (el) el.classList.add('active');

  const content = document.getElementById('content');
  content.innerHTML = '';
  p.render(content);

  if (window.innerWidth <= 900) closeSidebar();
}

function _setTopbar(title, sub) {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-sub').textContent   = sub;
}

function _clearActive() {
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sub-link').forEach(b => b.classList.remove('active'));
}

function toggleMenu(id, btn) {
  const menu   = document.getElementById(id);
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('open'));
  if (!isOpen) { menu.classList.add('open'); btn.classList.add('open'); }
}

function openSidebar()  { document.getElementById('sidebar').classList.add('open');    document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

/* ── Init ── */
seedDefaults();
navigate('dashboard', document.querySelector('.nav-link.active'));
</script>
</body>
</html>
