<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard — Basra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- JS Modules -->


<style>
/* ═══════════════════
   CSS VARIABLES
═══════════════════ */
:root {
  --bg:        #080e1e;
  --bg2:       #0d1428;
  --sidebar:   #0c1226;
  --sidebar-w: 260px;
  --surface:   rgba(18,26,50,.9);
  --surface2:  rgba(26,38,68,.8);
  --border:    rgba(148,163,184,.12);
  --border-s:  rgba(148,163,184,.22);
  --accent:    #4f8ef7;
  --accent2:   #34d399;
  --accent3:   #a78bfa;
  --warn:      #f59e0b;
  --danger:    #ef4444;
  --text:      #e5edf8;
  --muted:     #7489a8;
  --radius:    16px;
  --shadow:    0 8px 32px rgba(0,0,0,.32);
  --grad:      linear-gradient(135deg,#4f8ef7,#7c3aed);
  --grad-g:    linear-gradient(135deg,#059669,#34d399);
  --grad-w:    linear-gradient(135deg,#d97706,#fbbf24);
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ═══════════════════
   SIDEBAR
═══════════════════ */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--sidebar);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  right: 0;
  top: 0;
  z-index: 100;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width:40px; height:40px; border-radius:12px;
  background: var(--grad);
  display: grid; place-items: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 8px 20px rgba(79,142,247,.3);
}

.logo-text h2  { font-size:15px; font-weight:700; color:#fff; }
.logo-text p   { font-size:10px; color:var(--muted); margin-top:2px; }

.sidebar-nav   { flex:1; padding:12px 10px; display:flex; flex-direction:column; gap:2px; }

.nav-link {
  display: flex; align-items: center; gap:10px;
  padding: 11px 12px; border-radius: 12px;
  cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--muted); transition: all .2s;
  border: none; background: none;
  width: 100%; text-align: right;
  font-family: inherit;
}
.nav-link:hover               { background:rgba(255,255,255,.05); color:var(--text); }
.nav-link.active               { background:rgba(79,142,247,.12); color:var(--accent); font-weight:600; }
.nav-link .icon                { width:32px; height:32px; border-radius:9px; display:grid; place-items:center; font-size:16px; flex-shrink:0; background:rgba(255,255,255,.04); }
.nav-link.active .icon         { background:rgba(79,142,247,.18); }
.nav-link .arrow               { margin-right:auto; font-size:10px; transition:transform .2s; color:var(--muted); }
.nav-link.open .arrow          { transform:rotate(90deg); }

.sub-menu                      { display:none; padding:4px 0 4px 8px; }
.sub-menu.open                 { display:block; }

.sub-link {
  display: flex; align-items: center; gap:8px;
  padding: 9px 12px 9px 14px; border-radius: 10px;
  cursor: pointer; font-size: 12px; color: var(--muted);
  transition: all .2s; border:none; background:none;
  width: 100%; text-align: right; font-family: inherit;
}
.sub-link:hover                { background:rgba(255,255,255,.04); color:var(--text); }
.sub-link.active               { color:var(--accent2); font-weight:600; }
.sub-link::before              { content:""; width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; opacity:.5; }
.sub-link.active::before       { opacity:1; }

.sidebar-footer                { padding:14px; border-top:1px solid var(--border); }
.user-chip                     { display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(255,255,255,.04); border-radius:12px; border:1px solid var(--border); }
.user-avatar                   { width:32px; height:32px; border-radius:50%; background:var(--grad); display:grid; place-items:center; font-size:14px; flex-shrink:0; }
.user-info p                   { font-size:12px; font-weight:600; color:var(--text); }
.user-info span                { font-size:10px; color:var(--muted); }

/* ═══════════════════
   MAIN
═══════════════════ */
.main                          { margin-right:var(--sidebar-w); flex:1; height:100vh; overflow-y:auto; display:flex; flex-direction:column; }

.topbar {
  position: sticky; top:0; z-index:50;
  display: flex; align-items:center; justify-content:space-between;
  padding: 14px 20px;
  background: rgba(8,14,30,.85); backdrop-filter:blur(16px);
  border-bottom: 1px solid var(--border);
}
.page-title    { font-size:16px; font-weight:700; color:#fff; }
.page-subtitle { font-size:11px; color:var(--muted); margin-top:2px; }

.content       { flex:1; padding:20px; }

/* ═══════════════════
   COMPONENTS
═══════════════════ */
.card {
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius); padding:18px; margin-bottom:16px;
  backdrop-filter:blur(14px); box-shadow:var(--shadow);
  position:relative; overflow:hidden; transition:all .2s;
}
.card:hover      { transform:translateY(-2px); box-shadow:0 14px 36px rgba(0,0,0,.28); }
.card::before    { content:""; position:absolute; inset:0 0 auto 0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent); pointer-events:none; }
.card h2         { font-size:14px; font-weight:700; color:#dbe7ff; margin-bottom:14px; display:flex; align-items:center; gap:8px; }

.kpi-grid        { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
.kpi-card        { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; backdrop-filter:blur(14px); transition:all .2s; }
.kpi-card:hover  { transform:translateY(-3px); border-color:var(--border-s); }
.kpi-label       { font-size:11px; color:var(--muted); margin-bottom:8px; font-weight:500; }
.kpi-value       { font-size:24px; font-weight:700; color:#fff; letter-spacing:.3px; }

.table-wrap      { overflow:auto; border:1px solid var(--border); border-radius:14px; }
table            { width:100%; border-collapse:collapse; font-size:12px; min-width:500px; }
th,td            { padding:10px 12px; text-align:center; border-bottom:1px solid var(--border); }
th               { background:rgba(255,255,255,.04); color:var(--muted); font-weight:600; position:sticky; top:0; z-index:1; }
tr:last-child td { border-bottom:none; }
tbody tr:hover   { background:rgba(79,142,247,.04); }

.form-grid       { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
.form-group label { display:block; font-size:11px; color:var(--muted); margin-bottom:6px; }
.form-group select,
.form-group input,
.form-group textarea {
  width:100%; background:rgba(255,255,255,.04); border:1px solid var(--border);
  color:var(--text); padding:11px 12px; border-radius:12px;
  font-size:13px; font-family:inherit; outline:none; transition:all .18s;
}
.form-group select option { background:#0d1428; color:var(--text); }
.form-group select:focus,
.form-group input:focus  { border-color:var(--accent); background:rgba(255,255,255,.07); box-shadow:0 0 0 3px rgba(79,142,247,.14); }

.btn { display:inline-flex; align-items:center; gap:7px; padding:10px 18px; font-size:13px; font-family:inherit; border-radius:12px; border:none; cursor:pointer; font-weight:600; transition:all .2s; }
.btn:hover           { transform:translateY(-2px); }
.btn:active          { transform:scale(.98); }
.btn-primary         { background:var(--grad); color:#fff; box-shadow:0 10px 22px rgba(79,142,247,.22); }
.btn-success         { background:var(--grad-g); color:#fff; }
.btn-danger          { background:linear-gradient(135deg,#ef4444,#f87171); color:#fff; padding:6px 12px; font-size:11px; }
.btn-ghost           { background:rgba(255,255,255,.04); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover     { background:rgba(255,255,255,.07); border-color:var(--border-s); }
.btn-sm              { padding:7px 12px; font-size:11px; }
.btn-warn            { background:var(--grad-w); color:#000; }

.stats-row           { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:16px; }
.stat-mini           { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; font-size:11px; color:var(--muted); transition:all .2s; }
.stat-mini:hover     { transform:translateY(-2px); }
.stat-mini span      { color:#dbe7ff; font-weight:700; font-size:20px; display:block; margin-top:5px; }

.order-card          { background:var(--surface); border:1px solid var(--border); border-radius:18px; margin-bottom:10px; overflow:hidden; transition:all .2s; }
.order-card:hover    { transform:translateY(-2px); box-shadow:0 14px 32px rgba(0,0,0,.22); }
.order-head          { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; gap:12px; transition:.15s; }
.order-head:hover    { background:rgba(255,255,255,.03); }
.order-info          { display:flex; flex-wrap:wrap; gap:8px; align-items:center; flex:1; }
.pill                { font-size:11px; color:var(--muted); background:rgba(255,255,255,.04); padding:4px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.04); }
.order-body          { display:none; border-top:1px solid var(--border); padding:14px 16px; background:rgba(0,0,0,.1); }
.order-body.open     { display:block; }

.empty               { color:var(--muted); font-size:13px; padding:40px 0; text-align:center; background:var(--surface); border:1px dashed var(--border-s); border-radius:16px; }
.loader              { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 0; gap:16px; }
.spinner             { width:44px; height:44px; border:4px solid rgba(79,142,247,.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }

#toast {
  position:fixed; bottom:22px; left:50%;
  transform:translateX(-50%) translateY(90px);
  background:var(--grad-g); color:#fff;
  padding:12px 24px; border-radius:999px;
  font-size:13px; font-weight:700;
  transition:transform .3s; z-index:999;
  box-shadow:0 12px 28px rgba(16,185,129,.28);
}
#toast.show          { transform:translateX(-50%) translateY(0); }

.sidebar-toggle      { display:none; }

@keyframes spin      { to { transform:rotate(360deg); } }
@keyframes fadeUp    { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-up             { animation:fadeUp .35s ease both; }

/* ═══════════════════
   MOBILE
═══════════════════ */
@media(max-width:900px){
  .sidebar         { transform:translateX(100%); transition:transform .3s ease; }
  .sidebar.open    { transform:translateX(0); }
  .main            { margin-right:0; }
  .sidebar-toggle  { display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,.06); border:1px solid var(--border); cursor:pointer; font-size:18px; }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; }
  .sidebar-overlay.open { display:block; }
}

</style>

<script>

/* === JS/DB.JS === */

/* ═══════════════════════════════════════
   DB.JS — Storage + Helpers
═══════════════════════════════════════ */

const DB = {
  get:    k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
  getObj: k => { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch { return {}; } },
  set:    (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  setObj: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwM5BjrdR94y6B1As5WWLddTGKH73w4QggLUmvrWboCMuiZcQ65uq30cqUlcQi9ACUA0g/exec';

/* ── Formatters ── */
function fmt(n)  { return Number(n||0).toLocaleString('en'); }
function fmtV(n) { return Number(n||0).toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtSec(n) {
  if (n === '—' || n == null) return '—';
  const abs = Math.abs(n);
  return (n < 0 ? '-' : '') + fmt(abs);
}

/* ── Line color ── */
function lc(line) {
  const m = { Derma:'#4f8ef7', Optha:'#34d399', 'General Line':'#f59e0b', 'CM Line':'#a78bfa' };
  return m[line] || '#64748b';
}

/* ── Detect line from product name ── */
function getLineByProduct(name) {
  name = String(name).toLowerCase();
  if (['acretin','elica','fusibact','hi-quin','hiquin','lamifen','lican','promax','surecure','elicasal'].some(k => name.includes(k))) return 'Derma';
  if (['arox','brimo','brofix','fluca','hyfresh','latano','loxtra','olopat','optidex','optiflox','optifresh','optilone','optipred','tymer','xola','xolamol'].some(k => name.includes(k))) return 'Optha';
  if (['azi-once','azionce','feroton','maxim','prima','fast-flam','relaxon','dompy','fixit','meva','zoron'].some(k => name.includes(k))) return 'General Line';
  if (['vittoria','dapazin','sitagen','sitavic','vildus','lintra'].some(k => name.includes(k))) return 'CM Line';
  return '';
}

/* ── Format date string ── */
function formatDate(d) {
  if (!d) return '—';
  if (d.includes('GMT') || d.includes('00:00:00')) {
    try {
      const x = new Date(d);
      return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
    } catch(e) { return d; }
  }
  return d;
}

/* ── Toast ── */
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── Seed default data if empty ── */
function seedDefaults() {
  if (!DB.get('areas').length) {
    DB.set('areas', ['Basra']);
  }
  if (!DB.get('warehouses').length) {
    DB.set('warehouses', [
      { name:'سيادة',           type:'branch',     group:'سيادة Group', area:'Basra' },
      { name:'خضراء',           type:'branch',     group:'سيادة Group', area:'Basra' },
      { name:'لافندر',          type:'branch',     group:'سيادة Group', area:'Basra' },
      { name:'منهل',            type:'standalone', group:'',            area:'Basra' },
      { name:'اندلس',           type:'standalone', group:'',            area:'Basra' },
      { name:'ساوة',            type:'standalone', group:'',            area:'Basra' },
      { name:'لافقدر',          type:'standalone', group:'',            area:'Basra' },
      { name:'ركن الرافدين',    type:'standalone', group:'',            area:'Basra' },
    ]);
  }
}

/* ── Product name matching (alias support) ── */
function getProductBySheetName(sheetName) {
  const prods = DB.get('products') || [];
  return prods.find(p =>
    p.name === sheetName ||
    p.alias === sheetName ||
    (p.alias && sheetName && sheetName.includes(p.name)) ||
    (p.name && sheetName && sheetName.includes(p.name))
  );
}

function normalizeProductName(sheetName) {
  const p = getProductBySheetName(sheetName);
  return p ? p.name : sheetName;
}

/* ── Fuzzy key lookup for stockEntry/primarySales ── */
function getFuzzyKey(data, year, prodName, area, month, warehouse) {
  // البحث الدقيق أولاً
  const exactKey = warehouse
    ? `${year}__${prodName}__${area}__${month}__${warehouse}`
    : `${year}__${prodName}__${area}__${month}`;
  if (data[exactKey] !== undefined) return exactKey;

  // البحث المرن — لو الاسم موجود كجزء من الـ key
  const prefix = `${year}__`;
  const suffix = warehouse
    ? `__${area}__${month}__${warehouse}`
    : `__${area}__${month}`;

  const match = Object.keys(data).find(k =>
    k.startsWith(prefix) &&
    k.endsWith(suffix) &&
    k.includes(prodName)
  );
  return match || exactKey;
}

/* === JS/API.JS === */

/* ═══════════════════════════════════════
   API.JS — Google Sheets JSONP
═══════════════════════════════════════ */

let _cbIdx = 0;

function jsonpRequest(url, cb) {
  const name = `__cb_${++_cbIdx}`;
  window[name] = function(d) { cb(d); delete window[name]; document.getElementById(`s-${name}`)?.remove(); };
  const s = document.createElement('script');
  s.id = `s-${name}`;
  s.src = `${url}&callback=${name}`;
  s.onerror = function() { cb(null); delete window[name]; s.remove(); };
  document.head.appendChild(s);
}

function apiGet(action, params, cb) {
  let url = `${SHEETS_URL}?action=${action}`;
  if (params) Object.entries(params).forEach(([k,v]) => url += `&${k}=${encodeURIComponent(v)}`);
  jsonpRequest(url, cb);
}

function apiPost(body) {
  return fetch(SHEETS_URL, {
    method: 'POST',
    body: JSON.stringify(body),
  }).then(r => r.json());
}

/* === JS/DASHBOARD.JS === */

/* ═══════════════════════════════════════
   DASHBOARD.JS — Main Dashboard
═══════════════════════════════════════ */

function renderDashboard(el) {
  const now    = new Date();
  const year   = now.getFullYear();
  const curM   = now.getMonth() + 1;
  const areas  = DB.get('areas') || ['Basra'];
  const sublines = DB.getObj('sublines') || {};
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  el.innerHTML = `
    <div class="fade-up">

      <!-- ── Filters ── -->
      <div style="padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:16px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
          <div class="form-group"><label>Year</label>
            <select id="db-year" onchange="refreshDashboard()">
              ${[2024,2025,2026,2027,2028].map(y=>`<option${y===year?' selected':''}>${y}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Region</label>
            <select id="db-area" onchange="refreshDashboard()">
              ${areas.map(a=>`<option>${a}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>From</label>
            <select id="db-from" onchange="refreshDashboard()">
              ${months.map((m,i)=>`<option value="${i+1}"${i===0?' selected':''}>${m}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>To</label>
            <select id="db-to" onchange="refreshDashboard()">
              ${months.map((m,i)=>`<option value="${i+1}"${i===curM-1?' selected':''}>${m}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Sub-line</label>
            <select id="db-subline" onchange="refreshDashboard()">
              <option value="all">All Lines</option>
              ${Object.keys(sublines).map(s=>`<option value="${s}">${s}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>

      <div id="db-kpis" class="kpi-grid" style="margin-bottom:14px"></div>

      <div class="card" style="margin-bottom:14px">
        <h2>📊 أداء اللاينات</h2>
        <div id="db-lines"></div>
      </div>

      <div class="card" style="margin-bottom:14px">
        <h2>👥 أداء المندوبين</h2>
        <div id="db-reps"><div class="loader"><div class="spinner"></div></div></div>
      </div>

      <div class="card">
        <h2>📦 آخر الأوردرات</h2>
        <div id="dash-orders"><div class="loader"><div class="spinner"></div></div></div>

  refreshDashboard();
}

function setDbPeriod(from, to) {
  const f = document.getElementById('db-from');
  const t = document.getElementById('db-to');
  if (f) f.value = from;
  if (t) t.value = to;
  refreshDashboard();
}

function refreshDashboard() {
  const year     = Number(document.getElementById('db-year')?.value  || new Date().getFullYear());
  const area     = document.getElementById('db-area')?.value         || 'Basra';
  const fromM    = Number(document.getElementById('db-from')?.value  || 1);
  const toM      = Number(document.getElementById('db-to')?.value    || new Date().getMonth()+1);
  const sublineF = document.getElementById('db-subline')?.value      || 'all';

  const months   = [];
  for (let m = fromM; m <= toM; m++) months.push(m);

  const ps       = DB.getObj('primarySales');
  const wf       = DB.getObj('warehouseFlow');
  const targets  = DB.getObj('productTargets');
  const sublines = DB.getObj('sublines') || {};
  const achColor = c => c>=100?'var(--accent2)':c>=80?'var(--warn)':'var(--danger)';

  let prods = DB.get('products') || [];
  if (sublineF !== 'all' && sublines[sublineF]) {
    const slProds = sublines[sublineF].products || [];
    prods = prods.filter(p => slProds.includes(p.name));
  }

  // ── Primary (Qty) ──
  let psQty = 0;
  prods.forEach(p => {
    months.forEach(m => {
      psQty += Number(ps[`${year}__${p.name}__${area}__${m}`] || 0);
    });
  });

  // ── Primary Value = Qty × Price ──
  let psValue = 0;
  prods.forEach(p => {
    const price = Number(p.price || 0);
    months.forEach(m => {
      psValue += Number(ps[`${year}__${p.name}__${area}__${m}`] || 0) * price;
    });
  });

  // ── Target Value = Target Qty × Price ──
  let targetValue = 0, targetQty = 0;
  prods.forEach(p => {
    const price  = Number(p.price || 0);
    const ann    = targets[`${year}__${p.name}__${area}`] || p.annualTarget || 0;
    const tMonth = Math.round(ann / 12 * months.length);
    targetQty   += tMonth;
    targetValue += tMonth * price;
  });

  // ── Secondary ──
  let secTotal = 0;
  prods.forEach(p => {
    months.forEach(m => {
      const key = `${year}__${p.name}__${area}__${m}`;
      if (wf[key] !== undefined) secTotal += Number(wf[key]);
    });
  });

  const achievement = targetValue > 0 ? (psValue / targetValue * 100) : 0;
  const flowRate    = psQty > 0 ? (secTotal / psQty * 100) : 0;

  // ── KPIs ──
  const kpisEl = document.getElementById('db-kpis');
  if (kpisEl) kpisEl.innerHTML = `
    <div class="kpi-card" style="border-color:rgba(79,142,247,.3)">
      <div class="kpi-label">Primary Sales Value</div>
      <div class="kpi-value" style="font-size:20px">${fmtV(psValue)}</div>
      <div style="margin-top:8px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px">
          <span>Target: ${fmtV(targetValue)}</span>
          <span style="color:${achColor(achievement)};font-weight:700">${achievement.toFixed(1)}%</span>
        </div>
        <div style="height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden">
          <div style="width:${Math.min(achievement,100).toFixed(0)}%;height:100%;background:${achColor(achievement)};border-radius:999px"></div>
        </div>
      </div>
    </div>

    <div class="kpi-card" style="border-color:rgba(52,211,153,.3)">
      <div class="kpi-label">Secondary Sales</div>
      <div class="kpi-value" style="color:var(--accent)">${fmtSec(secTotal)}</div>
      <div style="margin-top:8px;font-size:11px;color:var(--muted)">
        Flow Rate: <span style="color:${achColor(flowRate)};font-weight:700">${flowRate>0?flowRate.toFixed(1)+'%':'—'}</span>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-label">أوردرات المجمعات</div>
      <div class="kpi-value" id="kpi-orders">⏳</div>
      <div style="margin-top:8px;font-size:11px;color:var(--muted)" id="kpi-orders-sub"></div>
    </div>

    <div class="kpi-card">
      <div class="kpi-label">قيمة الأوردرات</div>
      <div class="kpi-value" id="kpi-orders-val">⏳</div>
    </div>`;

  // ── Line Breakdown ──
  const linesEl = document.getElementById('db-lines');
  if (linesEl) {
    const lines = sublineF !== 'all'
      ? [...new Set(prods.map(p=>p.line))]
      : ['Derma','Optha','General Line','CM Line'];

    linesEl.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px">
      ${lines.map(line => {
        const lp = prods.filter(p=>p.line===line);
        let lVal=0, lTgtVal=0, lQty=0;
        lp.forEach(p => {
          const price = Number(p.price||0);
          const ann   = targets[`${year}__${p.name}__${area}`] || p.annualTarget || 0;
          const tM    = Math.round(ann/12*months.length);
          lTgtVal += tM * price;
          months.forEach(m => {
            const q = Number(ps[`${year}__${p.name}__${area}__${m}`]||0);
            lVal  += q * price;
            lQty  += q;
          });
        });
        const lAch = lTgtVal>0?(lVal/lTgtVal*100):0;
        return `<div style="padding:12px;background:rgba(255,255,255,.02);border:1px solid ${lc(line)}30;border-radius:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:11px;font-weight:700;color:${lc(line)}">${line}</span>
            <span style="font-size:11px;font-weight:700;color:${achColor(lAch)}">${lAch.toFixed(0)}%</span>
          </div>
          <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:2px">${fmtV(lVal)}</div>
          <div style="font-size:10px;color:var(--muted)">Target: ${fmtV(lTgtVal)}</div>
          <div style="height:3px;background:rgba(255,255,255,.06);border-radius:999px;margin-top:8px;overflow:hidden">
            <div style="width:${Math.min(lAch,100).toFixed(0)}%;height:100%;background:${lc(line)};border-radius:999px"></div>
          </div>
          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
            ${lp.slice(0,4).map(p=>{
              const price=Number(p.price||0);
              let pV=0; months.forEach(m=>{pV+=Number(ps[`${year}__${p.name}__${area}__${m}`]||0)*price;});
              const pT=Math.round((targets[`${year}__${p.name}__${area}`]||p.annualTarget||0)/12*months.length)*price;
              const pA=pT>0?(pV/pT*100):0;
              return `<span style="font-size:9px;background:rgba(255,255,255,.04);padding:2px 6px;border-radius:999px;color:var(--muted)">${p.name.split(' ')[0]} ${pA.toFixed(0)}%</span>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // ── Reps Performance ──
  const repsEl    = document.getElementById('db-reps');
  const savedReps = DB.getObj('repsData') || {};

  const repRows = Object.entries(savedReps)
    .filter(([k]) => k.endsWith(`__${year}`))
    .map(([k, repData]) => {
      const repName = k.replace(`__${year}`,'');
      const repProds = (repData.subline||[]);
      if (!repProds.length) return null;

      // فلتر حسب Sub-line
      let filteredProds = repProds;
      if (sublineF !== 'all' && sublines[sublineF]) {
        filteredProds = repProds.filter(pn => (sublines[sublineF].products||[]).includes(pn));
      }
      if (!filteredProds.length) return null;

      let rVal=0, rTgtVal=0;
      const prodDetails = filteredProds.map(pn => {
        const p     = prods.find(x=>x.name===pn); if (!p) return null;
        const price = Number(p.price||0);
        let pQty = 0;
        months.forEach(m => { pQty += Number(ps[`${year}__${pn}__${area}__${m}`]||0); });
        const pVal  = pQty * price;
        const ann   = targets[`${year}__${pn}__${area}`] || p.annualTarget || 0;
        const tQ    = repData.targets?.[pn] != null
          ? Math.round(Number(repData.targets[pn])/12*months.length)
          : Math.round(ann/12*months.length);
        const tVal  = tQ * price;
        const ach   = tVal>0?(pVal/tVal*100):0;
        rVal    += pVal;
        rTgtVal += tVal;
        return { name:pn, pVal, tVal, ach };
      }).filter(Boolean);

      const rAch = rTgtVal>0?(rVal/rTgtVal*100):0;
      const best = [...prodDetails].sort((a,b)=>b.pVal-a.pVal)[0];
      const worst = [...prodDetails].filter(p=>p.tVal>0).sort((a,b)=>a.ach-b.ach)[0];

      return { repName, line:repData.line||'—', rVal, rTgtVal, rAch, best, worst, prodDetails };
    }).filter(Boolean).sort((a,b) => b.rAch - a.rAch);

  if (repsEl) {
    if (!repRows.length) {
      repsEl.innerHTML = '<div style="color:var(--muted);font-size:12px">لا توجد مندوبين مضافين — أضف من Master Data → المندوبين</div>';
    } else {
      repsEl.innerHTML = `<div class="table-wrap"><table>
        <thead><tr>
          <th style="text-align:right">المندوب</th>
          <th>Line</th>
          <th>Sales Value</th>
          <th>Target Value</th>
          <th>Achievement%</th>
          <th style="text-align:right">أفضل مادة</th>
          <th style="text-align:right">أضعف مادة</th>
        </tr></thead>
        <tbody>
          ${repRows.map(r => `<tr>
            <td style="text-align:right;font-weight:700">👤 ${r.repName}</td>
            <td><span style="background:${lc(r.line)}18;color:${lc(r.line)};border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600">${r.line}</span></td>
            <td style="color:var(--accent2);font-weight:700">${fmtV(r.rVal)}</td>
            <td style="color:var(--muted)">${fmtV(r.rTgtVal)}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div style="flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;min-width:60px">
                  <div style="width:${Math.min(r.rAch,100).toFixed(0)}%;height:100%;background:${achColor(r.rAch)};border-radius:999px"></div>
                </div>
                <span style="font-weight:700;color:${achColor(r.rAch)};min-width:45px">${r.rAch.toFixed(1)}%</span>
              </div>
            </td>
            <td style="text-align:right;font-size:11px">
              ${r.best ? `<span style="color:var(--accent2)">${r.best.name.split(' ')[0]}</span> <span style="color:var(--muted)">${fmtV(r.best.pVal)}</span>` : '—'}
            </td>
            <td style="text-align:right;font-size:11px">
              ${r.worst ? `<span style="color:var(--danger)">${r.worst.name.split(' ')[0]}</span> <span style="color:var(--muted)">${r.worst.ach.toFixed(0)}%</span>` : '—'}
            </td>
          </tr>`).join('')}
        </tbody>
      </table></div>`;
    }
  }

  // ── Orders ──
  apiGet('getOrders', {}, function(data) {
    if (!data || !data.success) return;
    const orders = data.orders;
    const kpiO   = document.getElementById('kpi-orders');
    const kpiV   = document.getElementById('kpi-orders-val');
    const dashO  = document.getElementById('dash-orders');
    if (!kpiO) return;

    const filtered = orders.filter(o => {
      const d = new Date(o.date);
      return d.getFullYear()===year && months.includes(d.getMonth()+1);
    });

    const totalVal = filtered.reduce((s,o)=>s+(Number(o.quantity||0)+Number(o.bonusQty||0))*Number(o.unitPrice||0),0);
    kpiO.textContent = fmt(filtered.length);
    kpiV.textContent = fmtV(totalVal);

    const grouped = {};
    filtered.forEach(o => {
      const d = formatDate(o.date);
      const key = d+'__'+o.pharmacy+'__'+o.rep;
      if (!grouped[key]) grouped[key]={date:d,pharmacy:o.pharmacy,rep:o.rep,total:0,lines:new Set()};
      grouped[key].lines.add(o.line||getLineByProduct(o.product));
      grouped[key].total += (Number(o.quantity||0)+Number(o.bonusQty||0))*Number(o.unitPrice||0);
    });

    const recent = Object.values(grouped).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
    if (dashO) dashO.innerHTML = recent.map(o=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:600;font-size:13px">${o.pharmacy}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">👤 ${o.rep||'—'} • 📅 ${o.date}</div>
        </div>
        <div style="text-align:left">
          ${[...o.lines].filter(Boolean).map(l=>`<span style="background:${lc(l)}18;color:${lc(l)};border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600;margin-right:4px">${l}</span>`).join('')}
          <div style="font-size:13px;font-weight:700;color:var(--accent2);margin-top:4px">${fmtV(o.total)}</div>
        </div>
      </div>`).join('') || '<div class="empty">لا توجد بيانات</div>';
  });
}

function renderProductsTable() {
  const year    = document.getElementById('cfg-year')?.value || 2026;
  const area    = document.getElementById('cfg-area')?.value || 'Basra';
  const prods   = DB.get('products');
  const targets = DB.getObj('productTargets');
  const tbody   = document.getElementById('prod-tbody');
  if (!tbody) return;
  if (!prods.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty">لا توجد منتجات</td></tr>`; return; }
  tbody.innerHTML = prods.map((p,i) => {
    const key    = `${year}__${p.name}__${area}`;
    const target = targets[key] !== undefined ? targets[key] : (area==='Basra' && Number(year)===2026 ? p.annualTarget||0 : 0);
    return `<tr>
      <td style="text-align:right;font-weight:600">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
      </td>
      <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600">${p.line}</span></td>
      <td><input type="number" value="${target}" min="0"
        style="width:90px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
        onchange="saveTarget('${p.name.replace(/'/g,"\\'")}','${year}','${area}',this.value)"></td>
      <td style="color:var(--accent2)">${p.price ? '$'+Number(p.price).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</td>
      <td style="display:flex;gap:4px">
        <button class="btn btn-ghost btn-sm" onclick="editProd(${i})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProd(${i})">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function saveTarget(product, year, area, val) {
  const targets = DB.getObj('productTargets');
  targets[`${year}__${product}__${area}`] = Number(val)||0;
  DB.setObj('productTargets', targets);
  toast('✓ تم حفظ الهدف');
}

function migrateProductKeys() {
  const prods = DB.get('products') || [];
  if (!prods.length) return alert('لا توجد منتجات');

  const storageKeys = ['primarySales','warehouseFlow','stockEntry','productTargets'];
  let totalUpdated = 0;

  storageKeys.forEach(sk => {
    const data    = DB.getObj(sk);
    const updated = {};
    let changed   = false;

    Object.entries(data).forEach(([k, v]) => {
      // ابحث عن منتج يطابق جزء من الـ key
      let newKey = k;
      prods.forEach(p => {
        if (p.alias && p.alias !== p.name) {
          // لو الـ key يحتوي الـ alias القديم — استبدله بالاسم الجديد
          if (k.includes(`__${p.alias}__`) || k.includes(`__${p.alias}`)) {
            newKey = k.split(`__${p.alias}`).join(`__${p.name}`);
            changed = true;
            totalUpdated++;
          }
        }
      });
      updated[newKey] = v;
    });

    if (changed) DB.setObj(sk, updated);
  });

  if (totalUpdated > 0) {
    toast(`✓ تم تحديث ${totalUpdated} key`);
    renderProductsTable();
  } else {
    toast('✓ لا يوجد شيء يحتاج تحديث');
  }
}

function editProd(i) {
  const prods = DB.get('products');
  const p     = prods[i]; if (!p) return;

  const existing = document.getElementById('prod-edit-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'prod-edit-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:460px">
      <h2 style="margin-bottom:16px;color:#fff">✏️ تعديل منتج</h2>
      <div class="form-grid" style="margin-bottom:14px">
        <div class="form-group"><label>الاسم</label>
          <input type="text" id="ep-name" value="${p.name}">
        </div>
        <div class="form-group"><label>Line</label>
          <select id="ep-line">
            ${['Derma','Optha','General Line','CM Line'].map(l=>`<option${l===p.line?' selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>السعر (IQD)</label>
          <input type="number" id="ep-price" value="${p.price||''}" min="0" placeholder="0">
        </div>

        </div>
      </div>

        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('prod-edit-modal').remove()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveProdEdit(${i})">✓ حفظ</button>

function saveProdEdit(i) {
  const prods    = DB.get('products');
  const oldName  = prods[i]?.name;
  const newName  = document.getElementById('ep-name').value.trim();
  const newLine  = document.getElementById('ep-line').value;
  const newPrice = Number(document.getElementById('ep-price').value||0);
  const newAlias = document.getElementById('ep-alias').value.trim() || newName;
  if (!newName) return alert('ادخل الاسم');

  // لو تغير الاسم — حدّث كل الـ keys في localStorage
  if (oldName && oldName !== newName) {
    const keysToUpdate = ['primarySales','warehouseFlow','stockEntry','productTargets'];
    keysToUpdate.forEach(storageKey => {
      const data = DB.getObj(storageKey);
      const updated = {};
      Object.entries(data).forEach(([k,v]) => {
        const newKey = k.replace(
          new RegExp('(^|__)' + oldName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(__|\$)', 'g'),
          (m, p1, p2) => p1 + newName + (p2||'')
        );
        updated[newKey] = v;
      });
      DB.setObj(storageKey, updated);
    });
    toast('✓ تم تحديث البيانات المرتبطة');
  }

  prods[i] = { ...prods[i], name:newName, line:newLine, price:newPrice, alias:newAlias };
  DB.set('products', prods);
  document.getElementById('prod-edit-modal').remove();
  renderProductsTable();
  toast('✓ تم التحديث');
}

function deleteProd(i) {
  const prods = DB.get('products');
  if (!prods[i] || !confirm(`حذف ${prods[i].name}؟`)) return;
  prods.splice(i, 1);
  DB.set('products', prods);
  renderProductsTable();
  toast('✓ تم الحذف');
}

function saveDocEdit(oldName) {
  const newName  = document.getElementById('edit-doc-name').value.trim();
  const newLine  = document.getElementById('edit-doc-line').value;
  const newArea  = document.getElementById('edit-doc-area').value.trim();
  const newPhs   = [...document.querySelectorAll('#doc-edit-modal input[type=checkbox]:checked')].map(i=>i.value);

  if (!newName) return alert('ادخل الاسم');

  const docs = DB.get('doctors');
  const idx  = docs.findIndex(d=>d.name===oldName);
  if (idx<0) return;

  // تحديث الصيدليات — احذف الطبيب القديم وأضف الجديد
  const phs = DB.get('pharmacies');
  phs.forEach(p => {
    if (!p.doctors) p.doctors=[];
    p.doctors = p.doctors.filter(d=>d!==oldName);
  });
  newPhs.forEach(phName => {
    const ph = phs.find(p=>p.name===phName);
    if (ph) { if (!ph.doctors) ph.doctors=[]; if (!ph.doctors.includes(newName)) ph.doctors.push(newName); }
  });
  DB.set('pharmacies', phs);

  docs[idx] = { name:newName, line:newLine, area:newArea, pharmacies:newPhs };
  DB.set('doctors', docs);

  document.getElementById('doc-edit-modal').remove();
  renderDocTable(_docFilter);
  toast('✓ تم التحديث');
}

function _deleteDocDuplicate(name) {
  if (!confirm(`حذف ${name}؟`)) return;
  const phs = DB.get('pharmacies');
  phs.forEach(p => { if (p.doctors) p.doctors = p.doctors.filter(d=>d!==name); });
  DB.set('pharmacies', phs);
  DB.set('doctors', DB.get('doctors').filter(d=>d.name!==name));
  renderDocTable(_docFilter);
  toast('✓ تم الحذف');
}

      </tr>`;
    }).join('')}
    </tbody></table></div>`;
}

function editRepData(repName, year) {

  const sublines   = DB.getObj('sublines') || {};
  const areas      = DB.get('areas') || ['Basra'];
  const lines      = ['Derma','Optha','General Line','CM Line'];
  const targets    = DB.getObj('productTargets') || {};
  const existing   = document.getElementById('rep-edit-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'rep-edit-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';

  // حساب ما وزّعه المندوبون الآخرون
  const allocatedByOthers = {};
  Object.entries(savedReps).forEach(([k,v]) => {
    if (!k.endsWith(`__${year}`)) return;
    if (k.replace(`__${year}`,'') === repName) return;
    (v.subline||[]).forEach(prod => {
      allocatedByOthers[prod] = (allocatedByOthers[prod]||0) + Number(v.targets?.[prod]||0);
    });
  });

  const slEntries  = Object.entries(sublines);
  const repSL      = data.sublineName || '';
  const repTargets = data.targets || {};
  const repProds   = repSL ? (sublines[repSL]?.products||[]) : (data.subline||[]);

  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto">
      <h2 style="margin-bottom:4px;color:#fff">✏️ ${repName}</h2>
      <p style="color:var(--muted);font-size:11px;margin-bottom:16px">سنة ${year}</p>
      <div class="form-grid" style="margin-bottom:16px">
        <div class="form-group"><label>Line (للتصنيف)</label>
          <select id="re-line">
            <option value="">— اختر —</option>
            ${lines.map(l=>`<option${l===data.line?' selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>المنطقة</label>
          <select id="re-area">
            ${areas.map(a=>`<option${a===data.area?' selected':''}>${a}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1"><label>Sub-line</label>
          <select id="re-subline" onchange="updateRepSLProducts('${year}',this.value)">
            <option value="">— اختر Sub-line —</option>
            ${slEntries.length ? slEntries.map(([name])=>`<option value="${name}"${name===repSL?' selected':''}>${name} (${sublines[name].products?.length||0} مواد)</option>`).join('') : '<option disabled>لا توجد Sub-lines — أضف من Master Data</option>'}
          </select>
        </div>
      </div>
      <div id="re-sl-products" style="display:grid;gap:6px;max-height:300px;overflow-y:auto">
        ${_buildRepTargetCards(repProds, repTargets, targets, year, allocatedByOthers)}
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('rep-edit-modal').remove()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveRepData('${repName.replace(/'/g,"\'")}','${year}')">✓ حفظ</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function updateRepSLProducts(year, slName) {
  const sublines = DB.getObj('sublines') || {};
  const prods    = sublines[slName]?.products || [];
  const targets  = DB.getObj('productTargets') || {};
  const cont     = document.getElementById('re-sl-products');
  if (!cont) return;
  cont.innerHTML = _buildRepTargetCards(prods, {}, targets, year, {});
}

function _buildRepTargetCards(prods, repTargets, allTargets, year, allocatedByOthers) {
  if (!prods.length) return '<div style="color:var(--muted);font-size:12px;padding:10px">اختر Sub-line أولاً</div>';
  const allProds = DB.get('products') || [];
  return prods.map(prodName => {
    const p           = allProds.find(x=>x.name===prodName)||{name:prodName,line:'—'};
    const totalTarget = allTargets[`${year}__${prodName}__Basra`] || p.annualTarget || 0;
    const allocated   = allocatedByOthers[prodName] || 0;
    const remaining   = Math.max(0, totalTarget - allocated);
    const repTarget   = repTargets[prodName] != null ? repTargets[prodName] : remaining;
    const safeId      = 'rt_'+prodName.replace(/[^a-zA-Z0-9]/g,'_');
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;
      border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.02)">
      <div>
        <div style="font-size:12px;font-weight:600;color:#fff">${prodName}</div>
        <div style="font-size:10px;color:var(--muted)">
          Total: ${fmt(totalTarget)}
          ${allocated>0?` • Others: <span style="color:var(--warn)">${fmt(allocated)}</span>`:''}
          • Avail: <span style="color:var(--accent2)">${fmt(remaining)}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;color:var(--muted)">Target:</span>
        <input type="number" id="${safeId}" value="${repTarget}" min="0"
          placeholder="${fmt(remaining)}"
          style="width:80px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);
            padding:5px 8px;border-radius:8px;font-size:11px;text-align:center;font-family:inherit;outline:none">
      </div>
    </div>`;
  }).join('');
}


function saveRepData(repName, year) {
  const line        = document.getElementById('re-line')?.value    || '';
  const area        = document.getElementById('re-area')?.value    || '';
  const sublineName = document.getElementById('re-subline')?.value || '';
  const sublines    = DB.getObj('sublines') || {};
  const subline     = sublineName ? (sublines[sublineName]?.products||[]) : [];

  // اجمع الـ targets
  const repTargets = {};
  subline.forEach(prodName => {
    const safeId = 'rt_'+prodName.replace(/[^a-zA-Z0-9]/g,'_');
    const inp    = document.getElementById(safeId);
    if (inp && inp.value) repTargets[prodName] = Number(inp.value);
  });

  const savedReps = DB.getObj('repsData') || {};
  savedReps[`${repName}__${year}`] = { line, area, sublineName, subline, targets:repTargets };
  DB.setObj('repsData', savedReps);
  document.getElementById('rep-edit-modal').remove();
  renderRepsMaster();
  toast('✓ تم الحفظ');
}

function loadRepOrders() {
  if (!_repOrdersCache) { _loadRepOrdersData(); return; }

  const repF  = document.getElementById('ro-rep')?.value     || '';
  const lineF = document.getElementById('ro-line')?.value    || '';
  const prodF = document.getElementById('ro-product')?.value || '';
  const from  = document.getElementById('ro-from')?.value    || '';
  const to    = document.getElementById('ro-to')?.value      || '';

  const view    = document.getElementById('ro-view')?.value || 'rep';
  const reps    = DB.get('reps') || [];
  const prods   = DB.get('products') || [];
  const year    = document.getElementById('reps-year')?.value || new Date().getFullYear();
  const savedReps = DB.getObj('repsData') || {};

  // لو اختار "مواده فقط (Sub-line)"
  let sublineFilter = null;
  if (prodF === '__subline__' && repF) {
    const repData = savedReps[`${repF}__${year}`];
    sublineFilter = repData?.subline || [];
  }

  // لو view = subline → عرض كل أوردرات مواد Sub-line بغض النظر عن المندوب
  let sublineProds = null;
  if (view === 'subline' && repF) {
    const repData = savedReps[`${repF}__${year}`];
    sublineProds  = repData?.subline || [];
  }

  let orders = _repOrdersCache.filter(o => {
    // لو view=rep → فلتر بالمندوب، لو view=subline → ما نفلتر بالمندوب
    if (view === 'rep' && repF && o.rep !== repF) return false;
    if (from  && o.date < from)  return false;
    if (to    && o.date > to)    return false;
    if (lineF) {
      const p  = prods.find(p=>p.name===o.product||(p.name&&o.product&&o.product.includes(p.name)));
      const ol = p?.line || getLineByProduct(o.product);
      if (ol !== lineF) return false;
    }
    // لو subline view → فلتر بمواد المندوب فقط
    if (sublineProds) {
      const p     = prods.find(p=>p.name===o.product||(p.name&&o.product&&o.product.includes(p.name)));
      const pName = p?.name || o.product;
      if (!sublineProds.includes(pName)) return false;
    }
    if (sublineFilter) {
      const p     = prods.find(p=>p.name===o.product||(p.name&&o.product&&o.product.includes(p.name)));
      const pName = p?.name || o.product;
      if (!sublineFilter.includes(pName)) return false;
    } else if (prodF && prodF !== '__subline__') {
      if (o.product !== prodF && !o.product.includes(prodF)) return false;
    }
    return true;
  });

  // Stats
  const tOrd = orders.length;
  const tQty = orders.reduce((s,o)=>s+Number(o.quantity||0),0);
  const tBon = orders.reduce((s,o)=>s+Number(o.bonusQty||0),0);
  const tVal = orders.reduce((s,o)=>s+(Number(o.quantity||0)*Number(o.unitPrice||0)),0);
  const tBonV= orders.reduce((s,o)=>s+(Number(o.bonusQty||0)*Number(o.unitPrice||0)),0);

  const statsEl = document.getElementById('ro-stats');
  if (statsEl) statsEl.innerHTML = `
    <div class="stat-mini">Orders <span>${fmt(tOrd)}</span></div>
    <div class="stat-mini">Qty <span>${fmt(tQty)}</span></div>
    <div class="stat-mini">Bonus <span>${fmt(tBon)}</span></div>
    <div class="stat-mini">Order Value <span>${fmtV(tVal)}</span></div>
    <div class="stat-mini">Bonus Value <span>${fmtV(tBonV)}</span></div>
    <div class="stat-mini">Total <span>${fmtV(tVal+tBonV)}</span></div>`;

  const listEl = document.getElementById('ro-list');
  if (!listEl) return;
  if (!orders.length) { listEl.innerHTML='<div class="empty">لا توجد نتائج</div>'; return; }

  // تجميع حسب مندوب → مادة
  if (repF) {
    // عرض تفصيلي لمندوب واحد
    const repData = DB.get('reps')?.find(r=>r.name===repF);
    const byProd = {};
    orders.forEach(o => {
      const p = prods.find(p=>p.name===o.product||(p.name&&o.product&&o.product.includes(p.name)));
      const name = p?.name || o.product;
      const line = p?.line || getLineByProduct(o.product) || '—';
      if (!byProd[name]) byProd[name] = { line, qty:0, bonusQty:0, value:0, bonusVal:0 };
      byProd[name].qty      += Number(o.quantity||0);
      byProd[name].bonusQty += Number(o.bonusQty||0);
      byProd[name].value    += Number(o.quantity||0)*Number(o.unitPrice||0);
      byProd[name].bonusVal += Number(o.bonusQty||0)*Number(o.unitPrice||0);
    });

    const rows = Object.entries(byProd).sort((a,b)=>b[1].value-a[1].value);

    listEl.innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="text-align:right">Product</th><th>Line</th><th>Qty</th><th>Bonus</th><th>Value</th>
        </tr></thead><tbody>
        ${rows.map(([name,d])=>`<tr>
          <td style="text-align:right;font-weight:600;font-size:11px">${name}</td>
          <td><span style="background:${lc(d.line)}18;color:${lc(d.line)};border-radius:999px;padding:1px 6px;font-size:9px">${d.line}</span></td>
          <td>${fmt(d.qty)}</td>
          <td style="color:var(--warn)">${fmt(d.bonusQty)}</td>
          <td style="color:var(--accent2);font-weight:700">${fmtV(d.value)}</td>
        </tr>`).join('')}
        </tbody></table></div>`;
  } else {
    // عرض كل المندوبين
    const byRep = {};
    orders.forEach(o => {
      if (!byRep[o.rep]) byRep[o.rep] = { value:0, bonusVal:0, qty:0 };
      byRep[o.rep].value    += Number(o.quantity||0)*Number(o.unitPrice||0);
      byRep[o.rep].bonusVal += Number(o.bonusQty||0)*Number(o.unitPrice||0);
      byRep[o.rep].qty      += Number(o.quantity||0);
    });
    const sorted = Object.entries(byRep).sort((a,b)=>b[1].value-a[1].value);
    listEl.innerHTML = `<div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:right">المندوب</th><th>Line</th><th>Qty</th><th>Order Value</th><th>Bonus</th><th>Total</th>
      </tr></thead><tbody>
      ${sorted.map(([rep,d])=>{
        const repData = DB.get('reps')?.find(r=>r.name===rep);
        const line    = repData?.line || '—';
        return `<tr>
          <td style="text-align:right;font-weight:600">👤 ${rep}</td>
          <td><span style="background:${lc(line)}18;color:${lc(line)};border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600">${line}</span></td>
          <td>${fmt(d.qty)}</td>
          <td style="color:var(--accent2);font-weight:700">${fmtV(d.value)}</td>
          <td style="color:var(--warn)">${fmtV(d.bonusVal)}</td>
          <td style="color:#fff;font-weight:700">${fmtV(d.value+d.bonusVal)}</td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
  }
}

function _buildSLProductCards(prods, selected) {
  const byLine = {};
  prods.forEach(p => { if (!byLine[p.line]) byLine[p.line] = []; byLine[p.line].push(p); });
  return Object.entries(byLine).map(([line, items]) => `
    <div class="sl-line-group">
      <div style="font-size:10px;font-weight:700;color:${lc(line)};padding:2px 4px;margin-bottom:4px">${line}</div>
      ${items.map(p => {
        const isSelected = selected.includes(p.name);
        const safeId     = 'slp_'+p.name.replace(/[^a-zA-Z0-9]/g,'_');
        return `<div id="${safeId}" data-prod="${p.name}" data-line="${p.line}"
          onclick="toggleSLProduct('${p.name.replace(/'/g,"\\'")}',this)"
          style="display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;cursor:pointer;
            border:1px solid ${isSelected?'var(--accent)':'var(--border)'};
            background:${isSelected?'rgba(79,142,247,.1)':'rgba(255,255,255,.02)'};transition:.15s;margin-bottom:3px">
          <div style="width:16px;height:16px;border-radius:4px;border:2px solid ${isSelected?'var(--accent)':'var(--border)'};
            background:${isSelected?'var(--accent)':'transparent'};display:grid;place-items:center;flex-shrink:0;font-size:9px;color:#fff;font-weight:700">
            ${isSelected?'✓':''}
          </div>
          <span style="font-size:11px;color:${isSelected?'#fff':'var(--muted)'};font-weight:${isSelected?'600':'400'}">${p.name}</span>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function showSublinesForm() {
  document.getElementById('sl-form').style.display = 'block';
  document.getElementById('sl-name').value = '';
}

function filterSublinesProds() {
  const q    = document.getElementById('sl-search')?.value.toLowerCase() || '';
  const line = document.getElementById('sl-line')?.value || '';
  document.querySelectorAll('#sl-products [id^="slp_"]').forEach(card => {
    const matchQ    = card.dataset.prod?.toLowerCase().includes(q);
    const matchLine = !line || card.dataset.line === line;
    card.style.display = (matchQ && matchLine) ? '' : 'none';
  });
  // إخفاء المجموعات الفارغة
  document.querySelectorAll('#sl-products .sl-line-group').forEach(g => {
    const visible = [...g.querySelectorAll('[id^="slp_"]')].some(c=>c.style.display!=='none');
    g.style.display = visible ? '' : 'none';
  });
}

function toggleSLProduct(prodName, card) {
  const isSelected = card.style.background.includes('rgba(79');
  const nowSelected = !isSelected;
  card.style.border     = `1px solid ${nowSelected?'var(--accent)':'var(--border)'}`;
  card.style.background = nowSelected ? 'rgba(79,142,247,.1)' : 'rgba(255,255,255,.02)';
  const check = card.querySelector('div');
  const label = card.querySelector('span');
  if (check) { check.style.borderColor=nowSelected?'var(--accent)':'var(--border)'; check.style.background=nowSelected?'var(--accent)':'transparent'; check.textContent=nowSelected?'✓':''; }
  if (label) { label.style.color=nowSelected?'#fff':'var(--muted)'; label.style.fontWeight=nowSelected?'600':'400'; }
}

  ['stockEntry','warehouseFlow','primarySales','productTargets'].forEach(key => {

    Object.entries(data).forEach(([k, v]) => {
      // خذ اسم المنتج من الـ key (الجزء الثاني)
      const parts = k.split('__');
      const prodInKey = parts[1];
      // لو المنتج موجود في القائمة الحالية → احتفظ به

/* ── Stats helpers ── */
function getWhStats(whName) {
  const stock = DB.getObj('stockEntry');
  const wf    = DB.getObj('warehouseFlow');
  const ps    = DB.getObj('primarySales');
  const year  = new Date().getFullYear();

  let latestStock = 0, latestMonth = 0, secondary = 0, primary = 0;

  // آخر closing stock
  Object.entries(stock).forEach(([k,v]) => {
    if (k.includes(`__${whName}`) && !k.endsWith('__prim')) {
      const parts = k.split('__');
      const m = Number(parts[3]);
      if (Number(parts[0]) === year && m >= latestMonth) {
        latestMonth = m;
        latestStock = Number(v.close || 0);
      }
    }
  });

  // Secondary YTD
  Object.entries(wf).forEach(([k,v]) => {
    if (k.startsWith(year+'__') && k.includes(`__${whName}`)) secondary += Number(v||0);
  });

  // Primary YTD
  Object.entries(ps).forEach(([k,v]) => {
    if (k.startsWith(year+'__')) primary += Number(v||0);
  });

  const flow       = primary > 0 ? (secondary / primary * 100) : 0;
  const avgMonthly = latestMonth > 0 ? secondary / latestMonth : 0;
  const forecast   = avgMonthly > 0 ? Math.round(latestStock / avgMonthly * 30) : 0;

  return { stock:latestStock, secondary, primary, flow, forecast };
}

function getWhGroupStats(whNames) {
  let stock = 0, secondary = 0, primary = 0;
  whNames.forEach(n => {
    const s = getWhStats(n);
    stock += s.stock; secondary += s.secondary; primary += s.primary;
  });
  const flow = primary > 0 ? (secondary / primary * 100) : 0;
  return { stock, secondary, primary, flow };
}

function flowColor(f) {
  return f >= 80 ? 'var(--accent2)' : f >= 50 ? 'var(--warn)' : 'var(--danger)';
}

function renderWhGroupDetail(el, groupName) {
  const whs     = DB.get('warehouses') || [];

  const gs      = getWhGroupStats(members.map(m => m.name));
  const stock   = DB.getObj('stockEntry');
  const ps      = DB.getObj('primarySales');
  const prods   = DB.get('products');
  const year    = new Date().getFullYear();
  const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const cur     = new Date();

  // حساب إجمالي Opening و Closing لكل مادة من كل فروع المجموعة
  function getGroupProdStats(month) {
    return prods.map(p => {
      let totalOpen = 0, totalClose = 0, hasData = false;
      members.forEach(w => {
        const stKey = `${year}__${p.name}__Basra__${month}__${w.name}`;
        const saved = stock[stKey];
        if (saved?.open != null || saved?.close != null) {
          hasData = true;
          totalOpen  += Number(saved?.open  || 0);
          totalClose += Number(saved?.close || 0);
        }
      });
      // Primary للمجموعة
      const psKey    = `${year}__${p.name}__Basra__${month}`;
      const grpPrimKey = `group__${groupName}__${psKey}`;
      const savedGrpPrim = stock[grpPrimKey];
      const defPrimary   = Number(ps[psKey] || 0);
      const primary      = savedGrpPrim != null ? savedGrpPrim : defPrimary;
      const secondary    = hasData ? totalOpen + primary - totalClose : null;
      return { name:p.name, line:p.line, totalOpen, totalClose, primary, savedGrpPrim, psKey, grpPrimKey, secondary, hasData };
    }).filter(p => p.hasData || p.primary > 0);
  }

  el.innerHTML = `

      <button class="btn btn-ghost btn-sm" onclick="navigate('warehouses',null)" style="margin-bottom:14px">← رجوع</button>

        <p style="color:var(--muted);font-size:12px;margin-bottom:14px">
          Opening و Closing = مجموع الفروع تلقائياً • Primary يدوي للمجموعة
        </p>
        <div class="form-grid" style="margin-bottom:12px">
          <div class="form-group"><label>Month</label>
            <select id="grp-month" onchange="renderGroupStockTable('${groupName}')">
              ${months.map((m,i) => `<option value="${i+1}"${i===cur.getMonth()?' selected':''}>${m}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="saveGroupStock('${groupName}')" style="margin-bottom:12px">💾 Save & Calculate</button>

function renderGroupStockTable(groupName) {
  const month   = document.getElementById('grp-month')?.value || new Date().getMonth()+1;
  const whs     = DB.get('warehouses') || [];
  const members = whs.filter(w => w.group === groupName);
  const stock   = DB.getObj('stockEntry');
  const ps      = DB.getObj('primarySales');
  const prods   = DB.get('products');
  const year    = new Date().getFullYear();
  const tbody   = document.getElementById('grp-stock-tbody');
  if (!tbody) return;

  const rows = prods.map(p => {
    let totalOpen = 0, totalClose = 0, hasData = false;
    members.forEach(w => {
      const stKey = `${year}__${p.name}__Basra__${month}__${w.name}`;
      const saved = stock[stKey];
      if (saved?.open != null || saved?.close != null) {
        hasData = true;
        totalOpen  += Number(saved?.open  || 0);
        totalClose += Number(saved?.close || 0);
      }
    });
    if (!hasData) return null;
    const psKey      = `${year}__${p.name}__Basra__${month}`;
    const grpPrimKey = `group__${groupName}__${psKey}`;
    const defPrimary = Number(ps[psKey] || 0);
    const savedPrim  = stock[grpPrimKey];
    const effPrim    = savedPrim != null ? savedPrim : defPrimary;
    const secondary  = totalOpen + effPrim - totalClose;
    return { name:p.name, line:p.line, totalOpen, totalClose, effPrim, savedPrim, defPrimary, secondary, psKey, grpPrimKey };
  }).filter(Boolean);

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">لا توجد بيانات — أدخل Stock Entry للفروع أولاً</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(p => `<tr data-grpkey="${p.grpKey}" data-pskey="${p.psKey}" data-grpprimkey="${p.grpPrimKey}">
    <td style="text-align:right;font-weight:600">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
    </td>
    <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
    <td style="color:var(--accent2);font-weight:600">${fmt(p.totalOpen)}</td>
    <td>
      <input type="number" class="grp-primary" value="${p.savedPrim != null ? p.savedPrim : ''}" min="0"
        style="width:85px;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);color:var(--text);padding:6px 8px;border-radius:8px;font-size:12px;text-align:center;font-family:inherit;outline:none"
        placeholder="${fmt(p.defPrimary)}" oninput="calcGroupSec(this)">
    </td>
    <td style="color:var(--muted);font-weight:600">${fmt(p.totalClose)}</td>
    <td id="grpsec-${p.grpPrimKey.replace(/[^a-zA-Z0-9]/g,'_')}"
      style="font-weight:700;font-size:14px;color:${p.secondary<0?'var(--danger)':p.secondary>0?'var(--accent2)':'var(--muted)'}">
      ${fmtSec(p.secondary)}
    </td>
  </tr>`).join('');
}

function calcGroupSec(inp) {
  const row      = inp.closest('tr');
  const primKey  = row.dataset.grpprimkey;
  const psKey    = row.dataset.pskey;
  const ps       = DB.getObj('primarySales');
  const stock    = DB.getObj('stockEntry');
  const defPrim  = Number(ps[psKey] || 0);
  const primVal  = inp.value !== '' ? Number(inp.value) : defPrim;
  // Get totals from cells
  const cells    = row.querySelectorAll('td');
  const totalOpen  = Number(cells[2].textContent.replace(/,/g,'')) || 0;
  const totalClose = Number(cells[4].textContent.replace(/,/g,'')) || 0;
  const sec      = totalOpen + primVal - totalClose;
  const safeId   = primKey.replace(/[^a-zA-Z0-9]/g,'_');
  const el       = document.getElementById(`grpsec-${safeId}`);
  if (el) {
    el.textContent = fmtSec(sec);
    el.style.color = sec > 0 ? 'var(--accent2)' : sec < 0 ? 'var(--danger)' : 'var(--muted)';
  }
}

function saveGroupStock(groupName) {
  const stock = DB.getObj('stockEntry');
  const wf    = DB.getObj('warehouseFlow');
  const ps    = DB.getObj('primarySales');

  document.querySelectorAll('#grp-stock-tbody tr').forEach(row => {
    const grpPrimKey = row.dataset.grpprimkey;
    const psKey      = row.dataset.pskey;
    if (!grpPrimKey) return;
    const primVal = row.querySelector('.grp-primary')?.value;
    if (primVal !== '' && primVal != null) {
      stock[grpPrimKey] = Number(primVal);
    } else {
      delete stock[grpPrimKey];
    }
    // Update warehouseFlow
    const defPrim   = Number(ps[psKey] || 0);
    const effPrim   = primVal !== '' && primVal != null ? Number(primVal) : defPrim;
    const cells     = row.querySelectorAll('td');
    const totalOpen  = Number(cells[2].textContent.replace(/,/g,'')) || 0;
    const totalClose = Number(cells[4].textContent.replace(/,/g,'')) || 0;
    const sec        = totalOpen + effPrim - totalClose;
    wf[`${psKey}__${groupName}`] = sec;
    // Recalculate total
    const allWhKeys = Object.keys(wf).filter(k => k.startsWith(psKey + '__'));
    wf[psKey] = allWhKeys.reduce((s,k) => s + Number(wf[k]||0), 0);
  });

  DB.setObj('stockEntry', stock);
  DB.setObj('warehouseFlow', wf);
  toast('✓ Saved — Group Secondary updated');
  renderGroupStockTable(groupName);
}

function renderWhSummaryTable() {
  const year      = document.getElementById('ws-year')?.value;
  const monthFrom = Number(document.getElementById('ws-month-from')?.value || 1);
  const monthTo   = Number(document.getElementById('ws-month-to')?.value   || 12);
  const area      = document.getElementById('ws-area')?.value  || 'Basra';
  const whSel     = document.getElementById('ws-wh')?.value    || 'all';
  const line      = document.getElementById('ws-line')?.value  || 'all';
  if (!year) return;

  const prods = DB.get('products').filter(p => line==='all' || p.line===line);
  const stock = DB.getObj('stockEntry');
  const ps    = DB.getObj('primarySales');
  const whs   = DB.get('warehouses') || [];

  // تحديد المخازن المطلوبة
  let targetWhs = whs;
  if (whSel.startsWith('grp__')) {
    const grpName = whSel.replace('grp__','');
    targetWhs = whs.filter(w => w.group === grpName);
  } else if (whSel.startsWith('wh__')) {
    const whName = whSel.replace('wh__','');
    targetWhs = whs.filter(w => w.name === whName);
  }

  const rows = prods.map(p => {
    const psKey   = `${year}__${p.name}__Basra__${month}`;
    const primary = Number(ps[psKey] || 0);

    let totalOpen = 0, totalClose = 0, hasData = false;
    const whDetails = targetWhs.map(w => {
      const stKey = `${year}__${p.name}__Basra__${month}__${w.name}`;
      const saved = stock[stKey] || { open:null, close:null };
      const whPrim = stock[`${stKey}__prim`] != null ? Number(stock[`${stKey}__prim`]) : null;
      if (saved.open == null && saved.close == null) return { name:w.name, open:null, close:null, prim:whPrim, sec:null };
      hasData = true;
      const o = Number(saved.open  || 0);
      const c = Number(saved.close || 0);
      totalOpen  += o;
      totalClose += c;
      const effP = whPrim != null ? whPrim : 0;
      return { name:w.name, open:o, close:c, prim:whPrim, sec: o + effP - c };
    });

    if (!hasData && primary === 0) return null;

    const totalSec = totalOpen + primary - totalClose;
    const flow     = primary > 0 ? (totalSec / primary * 100) : 0;

    return { name:p.name, line:p.line, primary, totalOpen, totalClose, totalSec, flow, whDetails };
  }).filter(Boolean);

  const cont = document.getElementById('ws-table');
  if (!rows.length) { cont.innerHTML = '<div class="empty">لا توجد بيانات</div>'; return; }

  // لو مخزن واحد — عرض بدون عمود المخزن
  const showWhCols = targetWhs.length > 1;

  cont.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="text-align:right">Product</th>
          <th>Line</th>
          <th>Primary</th>
          <th>Opening</th>
          ${showWhCols ? targetWhs.map(w=>`<th style="color:var(--accent2)">${w.name}<br><span style="font-size:9px;color:var(--muted)">Secondary</span></th>`).join('') : ''}
          <th>Closing</th>
          <th style="color:var(--accent2)">Total Secondary</th>
          <th>Flow%</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => `<tr>
            <td style="text-align:right;font-weight:600;white-space:nowrap">
              <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(r.line)};margin-left:6px"></span>${r.name}
            </td>
            <td><span style="background:${lc(r.line)}18;color:${lc(r.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${r.line}</span></td>
            <td style="color:var(--muted)">${fmt(r.primary)}</td>
            <td style="color:var(--accent2)">${fmt(r.totalOpen)}</td>
            ${showWhCols ? r.whDetails.map(w=>`<td style="color:${w.sec==null?'var(--muted)':w.sec<0?'var(--danger)':w.sec>0?'var(--accent)':'var(--muted)'};font-weight:600">${w.sec==null?'—':fmtSec(w.sec)}</td>`).join('') : ''}
            <td style="color:var(--muted)">${fmt(r.totalClose)}</td>
            <td style="color:${r.totalSec<0?'var(--danger)':r.totalSec>0?'var(--accent2)':'var(--muted)'};font-weight:700;font-size:14px">${fmtSec(r.totalSec)}</td>
            <td style="color:${r.flow>=80?'var(--accent2)':r.flow>=50?'var(--warn)':'var(--danger)'};font-weight:600">${r.flow.toFixed(1)}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function addWarehouseFromPage() {
  const name  = document.getElementById('wha-name').value.trim();

  const group = document.getElementById('wha-group')?.value.trim() || '';

  if (!name) { msg.innerHTML = '<span style="color:var(--danger)">⚠ ادخل اسم المخزن</span>'; return; }

function renderSecGrid() {
  const year  = document.getElementById('sec-year')?.value;
  const month = document.getElementById('sec-month')?.value;
  const area  = document.getElementById('sec-area')?.value || 'Basra';
  const line  = document.getElementById('sec-line')?.value || 'all';
  if (!year || !month) return;

  const prods = DB.get('products').filter(p => line==='all' || p.line===line);
  const stock = DB.getObj('stockEntry');
  const ps    = DB.getObj('primarySales');
  const whs   = DB.get('warehouses') || [];
  const tbody = document.getElementById('sec-tbody');
  if (!tbody) return;

  let grandOpen = 0, grandClose = 0, grandPrim = 0, grandSec = 0;

  const rows = prods.map(p => {
    const psKey   = `${year}__${p.name}__${area}__${month}`;
    const primary = Number(ps[psKey] || 0);

    let totalOpen = 0, totalClose = 0, hasData = false;
    const whSecs = whs.map(w => {
      const stKey  = `${year}__${p.name}__${area}__${month}__${w.name}`;
      const saved  = stock[stKey] || { open:null, close:null };
      if (saved.open == null && saved.close == null) return null;
      hasData = true;
      const o = Number(saved.open  || 0);
      const c = Number(saved.close || 0);
      const whPrim = stock[`${stKey}__prim`] != null ? Number(stock[`${stKey}__prim`]) : 0;
      totalOpen  += o;
      totalClose += c;
      return o + whPrim - c;
    });

    if (!hasData && primary === 0) return null;

    // Total Secondary:
    // لو في Primary مخازن مدخل → يجمعهم مع Opening/Closing
    // لو لا → يستخدم Primary Sales
    let totalWhPrim = 0;
    whs.forEach(w => {
      const stKey  = `${year}__${p.name}__${area}__${month}__${w.name}`;
      const whPrim = stock[`${stKey}__prim`];
      if (whPrim != null) totalWhPrim += Number(whPrim);
    });
    const effPrimary = totalWhPrim > 0 ? totalWhPrim : primary;
    const totalSec   = totalOpen + effPrimary - totalClose;
    const flow       = effPrimary > 0 ? (totalSec / effPrimary * 100) : null;

    grandOpen  += totalOpen;
    grandClose += totalClose;
    grandPrim  += primary;
    grandSec   += totalSec;

    return `<tr>
      <td style="text-align:right;font-weight:600">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${lc(p.line)};margin-left:6px"></span>${p.name}
      </td>
      <td><span style="background:${lc(p.line)}18;color:${lc(p.line)};border-radius:999px;padding:2px 7px;font-size:10px;font-weight:600">${p.line}</span></td>
      <td style="color:var(--accent2)">${fmt(totalOpen)}</td>
      <td style="color:var(--muted)">${fmt(primary)}</td>
      <td style="color:var(--muted)">${fmt(totalClose)}</td>
      ${whSecs.map(v => `<td style="color:${v==null?'var(--muted)':v<0?'var(--danger)':v>0?'var(--accent)':'var(--muted)'};font-weight:600">${v==null?'—':fmtSec(v)}</td>`).join('')}
      <td style="color:${totalSec<0?'var(--danger)':totalSec>0?'var(--accent2)':'var(--muted)'};font-weight:700;font-size:14px">${fmtSec(totalSec)}</td>
      <td style="color:${flow===null?'var(--muted)':flow>=80?'var(--accent2)':flow>=50?'var(--warn)':'var(--danger)'}">${flow===null?'—':flow.toFixed(1)+'%'}</td>
    </tr>`;
  }).filter(Boolean);

  const grandFlow = grandPrim > 0 ? (grandSec / grandPrim * 100) : null;

  tbody.innerHTML = rows.join('') + `
    <tr style="background:rgba(255,255,255,.06);font-weight:700;border-top:2px solid var(--border)">
      <td style="text-align:right;color:#fff">Total</td>
      <td></td>
      <td style="color:var(--accent2)">${fmt(grandOpen)}</td>
      <td style="color:var(--muted)">${fmt(grandPrim)}</td>
      <td style="color:var(--muted)">${fmt(grandClose)}</td>
      ${whs.map(()=>'<td></td>').join('')}
      <td style="color:${grandSec<0?'var(--danger)':grandSec>0?'var(--accent2)':'var(--muted)'};font-size:16px">${fmtSec(grandSec)}</td>
      <td style="color:${grandFlow===null?'var(--muted)':grandFlow>=80?'var(--accent2)':grandFlow>=50?'var(--warn)':'var(--danger)'};font-size:16px">${grandFlow===null?'—':grandFlow.toFixed(1)+'%'}</td>
    </tr>`;
}
