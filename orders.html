<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أوردرات الصيدليات — v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2e3347;--accent:#4f8ef7;--accent2:#6ee7b7;--warn:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--muted:#64748b;--radius:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px 14px 80px}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .header h1{font-size:17px;font-weight:600}.header h1 span{color:var(--accent)}
  .nav-links{display:flex;gap:8px}
  .nav-btn{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--text);text-decoration:none;font-family:inherit}
  .nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .tab-btn{padding:7px 16px;font-size:12px;font-family:inherit;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer}
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .section{display:none}.section.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .card h2{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:14px}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:12px}
  .form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .form-group select,.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;font-family:inherit;outline:none}
  .form-group select:focus,.form-group input:focus{border-color:var(--accent)}
  .auto-info{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;min-height:24px}
  .chip{background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:11px;display:flex;align-items:center;gap:5px}
  .chip.blue{border-color:var(--accent);color:var(--accent)}.chip.green{border-color:var(--accent2);color:var(--accent2)}
  .items-header{display:grid;grid-template-columns:2.2fr 75px 75px 80px 75px 85px 30px;gap:5px;font-size:10px;color:var(--muted);padding:0 2px 6px;border-bottom:1px solid var(--border);margin-bottom:6px}
  .item-row{display:grid;grid-template-columns:2.2fr 75px 75px 80px 75px 85px 30px;gap:5px;margin-bottom:6px;align-items:center}
  .item-row select,.item-row input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:6px;font-size:12px;font-family:inherit;outline:none;width:100%}
  .item-row input[readonly]{color:var(--accent2);border-color:transparent;background:transparent;font-weight:600}
  .remove-btn{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0}
  .total-bar{background:var(--surface2);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin:10px 0;font-size:12px}
  .total-bar strong{font-size:16px;color:var(--accent2)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:12px;font-family:inherit;border-radius:6px;border:none;cursor:pointer;font-weight:500}
  .btn-primary{background:var(--accent);color:#fff}.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-danger{background:var(--danger);color:#fff;font-size:11px;padding:4px 10px}.btn-sm{padding:5px 12px;font-size:11px}
  .order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
  .order-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:10px}
  .order-head:hover{background:var(--surface2)}
  .order-info{display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex:1}
  .order-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
  .order-body.open{display:block}
  .detail-table{width:100%;border-collapse:collapse;font-size:11px}
  .detail-table th,.detail-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
  .detail-table th{background:var(--surface2);color:var(--muted);font-weight:500}
  .detail-table tr:last-child td{border-bottom:none}
  .stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .stat-mini{background:var(--surface2);border-radius:8px;padding:8px 14px;font-size:11px;border:1px solid var(--border)}
  .stat-mini span{color:var(--accent);font-weight:600;font-size:14px;display:block}
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .filter-bar select,.filter-bar input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
  .empty{color:var(--muted);font-size:12px;padding:30px 0;text-align:center}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#059669;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;transition:transform .3s;z-index:999}
  #toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <h1>📦 أوردرات الصيدليات <span>v3</span></h1>
  <div class="nav-links">
    <a href="data-entry.html" class="nav-btn">إدخال بيانات</a>
    <a href="dashboard-v3-full.html" class="nav-btn primary">الداشبورد ←</a>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tab-new',this)">➕ أوردر جديد</button>
  <button class="tab-btn" onclick="switchTab('tab-list',this);renderOrderList()">📋 سجل الأوردرات</button>
</div>

<!-- NEW ORDER -->
<div id="tab-new" class="section active">
  <div class="card">
    <h2>📋 معلومات الأوردر</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>المندوب (Rep)</label>
        <input type="text" id="ord-rep" placeholder="اسم المندوب" list="rep-list">
        <datalist id="rep-list"></datalist>
      </div>
      <div class="form-group">
        <label>الصيدلية</label>
        <select id="ord-pharmacy" onchange="onPharmacyChange()">
          <option value="">— اختر —</option>
        </select>
      </div>
      <div class="form-group">
        <label>المخزن</label>
        <input type="text" id="ord-warehouse" placeholder="اسم المخزن">
      </div>
      <div class="form-group">
        <label>التاريخ</label>
        <input type="date" id="ord-date">
      </div>
      <div class="form-group">
        <label>ملاحظة</label>
        <input type="text" id="ord-note" placeholder="اختياري">
      </div>
    </div>
    <div class="auto-info" id="pharmacy-info"></div>
  </div>

  <div class="card">
    <h2>💊 المواد</h2>
    <div class="items-header">
      <span>المادة</span>
      <span style="text-align:center">الكمية</span>
      <span style="text-align:center">البونص%</span>
      <span style="text-align:center">كمية البونص</span>
      <span style="text-align:center">السعر</span>
      <span style="text-align:center">القيمة</span>
      <span></span>
    </div>
    <div id="items-container"></div>
    <button class="btn btn-ghost btn-sm" onclick="addItemRow()" style="margin-top:6px">➕ مادة</button>
    <div class="total-bar">
      <span>إجمالي الأوردر</span>
      <strong id="order-total">0.00</strong>
    </div>
    <button class="btn btn-primary" onclick="saveOrder()">💾 حفظ الأوردر</button>
  </div>
</div>

<!-- ORDER LIST -->
<div id="tab-list" class="section">
  <div class="stats-row" id="list-stats"></div>
  <div class="filter-bar">
    <select id="filter-rep" onchange="renderOrderList()"><option value="">كل المندوبين</option></select>
    <select id="filter-pharmacy" onchange="renderOrderList()"><option value="">كل الصيدليات</option></select>
    <select id="filter-line" onchange="renderOrderList()"><option value="">كل اللاينات</option></select>
    <input type="month" id="filter-month" onchange="renderOrderList()">
    <button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ مسح</button>
  </div>
  <div id="order-list"></div>
</div>

<div id="toast">✓ تم الحفظ</div>

<script>
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem(k))||[];}catch{return [];}},
  getObj:k=>{try{return JSON.parse(localStorage.getItem(k))||{};}catch{return {};}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycby75MvmFGFgbJlvSbVp1_f3OvFnvgNzyR5MuLkZx3SQG_AqegkH-0BUPMd8vbjR6r6iqg/exec';

async function pushOrderToSheets(order){
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addOrder', order }),
    });
  } catch(e){
    console.warn('Sheets push failed:', e);
  }
}

function fmt(n){return Number(n||0).toLocaleString('en');}
function fmtV(n){return Number(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});}
function uid(){return 'ORD-'+Date.now().toString(36).toUpperCase();}
function lc(line){const m={Derma:'#4f8ef7',Optha:'#6ee7b7','General Line':'#f59e0b','CM Line':'#a78bfa'};return m[line]||'#64748b';}

function getDoctorByLine(pharmacyName, line){
  const ph = DB.get('pharmacies').find(p=>p.name===pharmacyName);
  if (!ph) return '—';
  const doctors = ph.doctors||(ph.doctor?[ph.doctor]:[]);
  if (!doctors.length) return '—';
  const allDocs = DB.get('doctors');
  const matched = doctors.filter(n=>{const d=allDocs.find(x=>x.name===n);return d&&d.line===line;});
  return matched.length ? matched.join(' / ') : doctors[0];
}

function init(){
  document.getElementById('ord-date').value = new Date().toISOString().split('T')[0];
  populatePharmacies();
  populateRepList();
  populateFilterDropdowns();
  addItemRow();
  // تحميل الأوردرات من Google Sheets
  loadOrdersFromSheets();
}

async function loadOrdersFromSheets(){
  const container = document.getElementById('order-list');
  const stats     = document.getElementById('list-stats');
  if(stats) stats.innerHTML = `<div class="stat-mini">الأوردرات <span>⏳</span></div>`;

  jsonpRequest(`${SHEETS_URL}?action=getOrders`, function(data){
    if (!data || !data.success){
      if(container) container.innerHTML = `<div class="empty">⚠ تعذر تحميل البيانات</div>`;
      return;
    }

    const grouped = {};
    data.orders.forEach(o => {
      const key = `${o.date}__${o.pharmacy}__${o.rep}__${o.warehouse}`;
      if (!grouped[key]){
        grouped[key] = {
          id: key, date: o.date, rep: o.rep,
          pharmacy: o.pharmacy, warehouse: o.warehouse,
          area: '', items: [], total: 0,
        };
      }
      grouped[key].items.push({
        product:    o.product,
        line:       o.line || getLineByProduct(o.product),
        qty:        o.quantity,
        bonusPct:   o.bonusPct,
        bonusQty:   o.bonusQty,
        price:      o.unitPrice,
        orderValue: o.orderValue || o.quantity * o.unitPrice,
        bonusValue: o.bonusValue || o.bonusQty * o.unitPrice,
        value:      o.totalValue,
        totalValue: o.totalValue,
        doctor:     getDoctorByLine(o.pharmacy, o.line || getLineByProduct(o.product)),
      });
      grouped[key].total += o.totalValue;
    });

    const orders = Object.values(grouped).sort((a,b)=>b.date.localeCompare(a.date));
    renderOrdersFromSheets(orders);
  });
}

// JSONP — يحل مشكلة CORS مع file://
let jsonpCallbackIdx = 0;
function jsonpRequest(url, callback){
  const cbName = `__jsonp_cb_${++jsonpCallbackIdx}`;
  window[cbName] = function(data){
    callback(data);
    delete window[cbName];
    document.getElementById(`script-${cbName}`)?.remove();
  };
  const script = document.createElement('script');
  script.id  = `script-${cbName}`;
  script.src = `${url}&callback=${cbName}`;
  script.onerror = function(){
    callback(null);
    delete window[cbName];
    script.remove();
  };
  document.head.appendChild(script);
}

function getLineByProduct(productName){
  const prods = DB.get('products');
  const p = prods.find(x=>x.name===productName);
  if(p?.line) return p.line;

  const name = String(productName).toLowerCase();
  const derma   = ['acretin','elica','fusibact','hi-quin','hiquin','lamifen','lican','promax','surecure','elicasal'];
  const optha   = ['arox','brimo','brofix','fluca','hyfresh','latano','loxtra','olopat','optidex','optiflox','optifresh','optilone','optipred','tymer','uni fresh','unifresh','xola','xolamol','optha'];
  const general = ['azi-once','azionce','feroton','maxim','prima','fast-flam','fastflam','relaxon','dompy','fixit','meva','zoron','azi once'];
  const cm      = ['vittoria','dapazin','sitagen','sitavic','vildus','lintra'];

  if (derma.some(k   => name.includes(k))) return 'Derma';
  if (optha.some(k   => name.includes(k))) return 'Optha';
  if (general.some(k => name.includes(k))) return 'General Line';
  if (cm.some(k      => name.includes(k))) return 'CM Line';
  return '';
}

function renderOrdersFromSheets(orders){
  const repF   = document.getElementById('filter-rep')?.value      || '';
  const phF    = document.getElementById('filter-pharmacy')?.value  || '';
  const lineF  = document.getElementById('filter-line')?.value      || '';
  const monthF = document.getElementById('filter-month')?.value     || '';

  const filtered = orders.filter(o=>{
    if(repF   && o.rep!==repF)                         return false;
    if(phF    && o.pharmacy!==phF)                     return false;
    if(lineF  && !o.items.some(i=>i.line===lineF))     return false;
    if(monthF && !o.date.startsWith(monthF))           return false;
    return true;
  });

  // حسابات صحيحة
  const totalOrders    = filtered.length;
  const totalQty       = filtered.reduce((s,o)=>o.items.reduce((ss,i)=>ss+i.qty,0)+s,0);
  const totalBonusQty  = filtered.reduce((s,o)=>o.items.reduce((ss,i)=>ss+(i.bonusQty||0),0)+s,0);
  const totalOrderVal  = filtered.reduce((s,o)=>o.items.reduce((ss,i)=>ss+(i.qty*i.price),0)+s,0);
  const totalBonusVal  = filtered.reduce((s,o)=>o.items.reduce((ss,i)=>ss+(i.bonusQty*i.price),0)+s,0);
  const totalGrand     = totalOrderVal + totalBonusVal;

  const stats = document.getElementById('list-stats');
  if(stats) stats.innerHTML=`
    <div class="stat-mini">الأوردرات <span>${totalOrders}</span></div>
    <div class="stat-mini">إجمالي الكميات <span>${fmt(totalQty)}</span></div>
    <div class="stat-mini">إجمالي البونص <span>${fmt(totalBonusQty)}</span></div>
    <div class="stat-mini">قيمة الطلبيات <span>${fmtV(totalOrderVal)}</span></div>
    <div class="stat-mini">قيمة البونص <span>${fmtV(totalBonusVal)}</span></div>
    <div class="stat-mini">الإجمالي الكلي <span>${fmtV(totalGrand)}</span></div>
  `;

  const container = document.getElementById('order-list');
  if(!container) return;
  if(!filtered.length){ container.innerHTML='<div class="empty">لا توجد أوردرات</div>'; return; }

  container.innerHTML = filtered.map((o,oi)=>{
    const lines   = [...new Set(o.items.map(i=>i.line).filter(Boolean))];
    const doctors = [...new Set(o.items.map(i=>i.doctor).filter(d=>d&&d!=='—'))];
    const ordVal  = o.items.reduce((s,i)=>s+(i.qty*i.price),0);
    const bonVal  = o.items.reduce((s,i)=>s+(i.bonusQty*i.price),0);
    const grand   = ordVal + bonVal;
    const safeId  = `ord_${oi}`;

    const lineChips = lines.map(l=>
      `<span style="background:${lc(l)}22;color:${lc(l)};border:1px solid ${lc(l)}44;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600">${l}</span>`
    ).join('');

    return `
    <div class="order-card">
      <div class="order-head" onclick="toggleOrder('${safeId}')">
        <div class="order-info">
          <span style="font-size:14px;font-weight:700">${o.pharmacy}</span>
          ${o.rep    ?`<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:999px">👤 ${o.rep}</span>`:''}
          ${o.warehouse?`<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:999px">🏭 ${o.warehouse}</span>`:''}
          <span style="font-size:11px;color:var(--muted)">📅 ${o.date}</span>
          ${lineChips}
          ${doctors.map(d=>`<span style="font-size:10px;color:var(--accent);background:rgba(79,142,247,.1);padding:2px 8px;border-radius:999px">👨‍⚕️ ${d}</span>`).join('')}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          <span style="font-size:12px;color:var(--accent2)">طلبية: <strong>${fmtV(ordVal)}</strong></span>
          <span style="font-size:12px;color:var(--warn)">بونص: <strong>${fmtV(bonVal)}</strong></span>
          <span style="font-size:13px;color:#fff;font-weight:700">الإجمالي: ${fmtV(grand)}</span>
        </div>
      </div>
      <div class="order-body" id="body-${safeId}">
        <div style="overflow-x:auto">
        <table class="detail-table">
          <thead><tr>
            <th style="text-align:right">المادة</th>
            <th>اللاين</th>
            <th>الطبيب</th>
            <th>الكمية</th>
            <th>السعر</th>
            <th>قيمة الطلبية</th>
            <th>البونص%</th>
            <th>كمية البونص</th>
            <th>قيمة البونص</th>
            <th>الإجمالي</th>
          </tr></thead>
          <tbody>
            ${o.items.map(i=>{
              const iOrdVal  = i.qty      * i.price;
              const iBonVal  = i.bonusQty * i.price;
              const iGrand   = iOrdVal + iBonVal;
              return `<tr>
                <td style="text-align:right;font-weight:600;white-space:nowrap">${i.product}</td>
                <td>${i.line?`<span style="background:${lc(i.line)}22;color:${lc(i.line)};border-radius:999px;padding:1px 8px;font-size:10px;font-weight:600">${i.line}</span>`:'-'}</td>
                <td style="font-size:10px;color:var(--accent);white-space:nowrap">${i.doctor||'—'}</td>
                <td style="font-weight:600">${fmt(i.qty)}</td>
                <td>${fmtV(i.price)}</td>
                <td style="color:var(--accent2);font-weight:600">${fmtV(iOrdVal)}</td>
                <td style="color:var(--muted)">${i.bonusPct||0}%</td>
                <td style="color:var(--warn);font-weight:600">${fmt(i.bonusQty||0)}</td>
                <td style="color:var(--warn);font-weight:600">${fmtV(iBonVal)}</td>
                <td style="color:#fff;font-weight:700;background:rgba(255,255,255,.05)">${fmtV(iGrand)}</td>
              </tr>`;
            }).join('')}
            <tr style="background:var(--surface2);font-weight:700">
              <td colspan="5" style="text-align:right;color:var(--muted)">الإجمالي</td>
              <td style="color:var(--accent2)">${fmtV(ordVal)}</td>
              <td></td>
              <td style="color:var(--warn)">${fmt(o.items.reduce((s,i)=>s+(i.bonusQty||0),0))}</td>
              <td style="color:var(--warn)">${fmtV(bonVal)}</td>
              <td style="color:#fff">${fmtV(grand)}</td>
            </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>`;
  }).join('');

  // Update filter dropdowns
  const reps = [...new Set(orders.map(o=>o.rep).filter(Boolean))];
  const phs  = [...new Set(orders.map(o=>o.pharmacy).filter(Boolean))];
  document.getElementById('filter-rep').innerHTML =
    `<option value="">كل المندوبين</option>`+reps.map(r=>`<option>${r}</option>`).join('');
  document.getElementById('filter-pharmacy').innerHTML =
    `<option value="">كل الصيدليات</option>`+phs.map(p=>`<option>${p}</option>`).join('');
}

function populatePharmacies(){
  const phs=DB.get('pharmacies');
  document.getElementById('ord-pharmacy').innerHTML=
    `<option value="">— اختر —</option>`+
    phs.map(p=>`<option value="${p.name}">${p.name}${p.area?' ('+p.area+')':''}</option>`).join('');
}

function populateRepList(){
  const reps=[...new Set(DB.get('orders').map(o=>o.rep).filter(Boolean))];
  document.getElementById('rep-list').innerHTML=reps.map(r=>`<option value="${r}">`).join('');
}

function populateFilterDropdowns(){
  const phs=DB.get('pharmacies');
  const orders=DB.get('orders');
  const reps=[...new Set(orders.map(o=>o.rep).filter(Boolean))];
  document.getElementById('filter-pharmacy').innerHTML=
    `<option value="">كل الصيدليات</option>`+phs.map(p=>`<option>${p.name}</option>`).join('');
  document.getElementById('filter-rep').innerHTML=
    `<option value="">كل المندوبين</option>`+reps.map(r=>`<option>${r}</option>`).join('');
  document.getElementById('filter-line').innerHTML=
    `<option value="">كل اللاينات</option>`+
    ['Derma','Optha','General Line','CM Line'].map(l=>`<option>${l}</option>`).join('');
}

function onPharmacyChange(){
  const name=document.getElementById('ord-pharmacy').value;
  const info=document.getElementById('pharmacy-info');
  if(!name){info.innerHTML='';return;}
  const ph=DB.get('pharmacies').find(p=>p.name===name);
  if(!ph){info.innerHTML='';return;}
  const doctors=ph.doctors||(ph.doctor?[ph.doctor]:[]);
  info.innerHTML=`
    ${ph.area?`<div class="chip">📍 ${ph.area}</div>`:''}
    ${ph.location?`<div class="chip">🗺 ${ph.location}</div>`:''}
    ${doctors.map(d=>`<div class="chip blue">👨‍⚕️ ${d}</div>`).join('')}
  `;
}

let itemCount=0;

function addItemRow(){
  const id=++itemCount;
  const prods=DB.get('products');
  const opts=prods.map(p=>`<option value="${p.name}" data-price="${p.price||0}" data-line="${p.line}">${p.name}</option>`).join('');
  const row=document.createElement('div');
  row.className='item-row';
  row.id=`item-${id}`;
  row.innerHTML=`
    <select id="ip-${id}" onchange="onProductChange(${id})">
      <option value="">— اختر مادة —</option>${opts}
    </select>
    <input type="number" id="iq-${id}" min="0" placeholder="0" oninput="calcBonusQty(${id});calcItem(${id})">
    <input type="number" id="ib-${id}" min="0" max="100" placeholder="0" step="0.1" oninput="calcBonusQty(${id})">
    <input type="number" id="ibq-${id}" min="0" placeholder="0" readonly>
    <input type="number" id="ipr-${id}" min="0" placeholder="0" oninput="calcItem(${id})">
    <input type="text"   id="iv-${id}"  readonly placeholder="0.00">
    <button class="remove-btn" onclick="removeItem(${id})">✕</button>
  `;
  document.getElementById('items-container').appendChild(row);
}

function onProductChange(id){
  const sel=document.getElementById(`ip-${id}`);
  const opt=sel.options[sel.selectedIndex];
  if(opt?.dataset?.price) document.getElementById(`ipr-${id}`).value=opt.dataset.price;
  calcItem(id);
}

function calcBonusQty(id){
  const qty=Number(document.getElementById(`iq-${id}`)?.value||0);
  const pct=Number(document.getElementById(`ib-${id}`)?.value||0);
  const bq=Math.round(qty*pct/100);
  const el=document.getElementById(`ibq-${id}`);
  if(el) el.value=bq||'';
  calcItem(id);
}

function calcItem(id){
  const qty=Number(document.getElementById(`iq-${id}`)?.value||0);
  const pr =Number(document.getElementById(`ipr-${id}`)?.value||0);
  const el =document.getElementById(`iv-${id}`);
  if(el) el.value=qty&&pr?fmtV(qty*pr):'';
  calcTotal();
}

function calcTotal(){
  let t=0;
  document.querySelectorAll('[id^="iq-"]').forEach(el=>{
    const id=el.id.replace('iq-','');
    t+=Number(el.value||0)*Number(document.getElementById(`ipr-${id}`)?.value||0);
  });
  document.getElementById('order-total').textContent=fmtV(t);
}

function removeItem(id){document.getElementById(`item-${id}`)?.remove();calcTotal();}

function getItems(){
  const items=[];
  document.querySelectorAll('[id^="ip-"]').forEach(el=>{
    const id=el.id.replace('ip-','');
    const product=el.value;
    if(!product) return;
    const qty=Number(document.getElementById(`iq-${id}`)?.value||0);
    if(!qty) return;
    const bonusPct=Number(document.getElementById(`ib-${id}`)?.value||0);
    const bonusQty=Number(document.getElementById(`ibq-${id}`)?.value||0);
    const price=Number(document.getElementById(`ipr-${id}`)?.value||0);
    const opt=el.options[el.selectedIndex];
    const line=opt?.dataset?.line||'';
    const doctor=getDoctorByLine(document.getElementById('ord-pharmacy').value,line);
    items.push({product,line,qty,bonusPct,bonusQty,price,value:qty*price,doctor});
  });
  return items;
}

function saveOrder(){
  const rep=document.getElementById('ord-rep').value.trim();
  const pharmacy=document.getElementById('ord-pharmacy').value;
  const warehouse=document.getElementById('ord-warehouse').value.trim();
  const date=document.getElementById('ord-date').value;
  const note=document.getElementById('ord-note').value.trim();
  if(!pharmacy) return alert('اختر الصيدلية');
  if(!date) return alert('اختر التاريخ');
  const items=getItems();
  if(!items.length) return alert('أضف مادة واحدة على الأقل');
  const ph=DB.get('pharmacies').find(p=>p.name===pharmacy)||{};
  const order={
    id:uid(),date,rep,pharmacy,
    area:ph.area||'',location:ph.location||'',
    doctors:ph.doctors||(ph.doctor?[ph.doctor]:[]),
    warehouse,note,items,
    total:items.reduce((s,i)=>s+i.value,0),
    createdAt:Date.now()
  };
  const orders=DB.get('orders');
  orders.unshift(order);
  DB.set('orders',orders);

  // إرسال للشيت تلقائياً
  pushOrderToSheets(order);

  toast('✓ تم حفظ الأوردر');
  resetForm();
  populateRepList();
  populateFilterDropdowns();
}

function resetForm(){
  ['ord-rep','ord-warehouse','ord-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ord-pharmacy').value='';
  document.getElementById('ord-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('pharmacy-info').innerHTML='';
  document.getElementById('items-container').innerHTML='';
  document.getElementById('order-total').textContent='0.00';
  itemCount=0;
  addItemRow();
}

function renderOrderList(){ loadOrdersFromSheets(); }

function toggleOrder(id){
  const el = document.getElementById(`body-${id}`);
  if(el) el.classList.toggle('open');
}

function deleteOrder(id){
  if(!confirm('حذف هذا الأوردر؟')) return;
  DB.set('orders',DB.get('orders').filter(o=>o.id!==id));
  renderOrderList();
  populateFilterDropdowns();
}

function clearFilters(){
  ['filter-rep','filter-pharmacy','filter-line','filter-month'].forEach(id=>document.getElementById(id).value='');
  renderOrderList();
}

function switchTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
}

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

init();
</script>
</body>
</html>
